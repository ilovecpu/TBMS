function log(msg, cls) {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  line.className = cls || '';
  line.textContent = msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

async function saveEntry(entry) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'saveKB', apikey: API_KEY, entry }),
    redirect: 'follow'
  });
  return await res.json();
}

async function startImport() {
  const btn = document.getElementById('btnStart');
  btn.disabled = true;
  btn.textContent = '⏳ Importing...';

  let ok = 0, fail = 0;

  for (let i = 0; i < entries.length; i++) {
    const e = entries[i];
    log(`[${i+1}/5] Saving: ${e.title}...`, 'info');

    try {
      const result = await saveEntry(e);
      if (result && result.status === 'ok') {
        log(`  ✓ Saved! ID: ${result.entry?.id || '?'}`, 'ok');
        ok++;
      } else {
        log(`  ✗ Failed: ${JSON.stringify(result)}`, 'err');
        fail++;
      }
    } catch(err) {
      log(`  ✗ Error: ${err.message}`, 'err');
      fail++;
    }

    // Wait 1.5s between saves
    if (i < entries.length - 1) {
      await new Promise(r => setTimeout(r, 1500));
    }
  }

  log('', '');
  log(`=== Import Complete: ${ok} saved, ${fail} failed ===`, ok === 5 ? 'ok' : 'warn');
  document.getElementById('summary').innerHTML = `✅ ${ok}/5 entries saved` + (fail > 0 ? ` | ❌ ${fail} failed` : '');

  btn.textContent = '✅ Done!';
  if (fail > 0) {
    btn.textContent = '🔄 Retry';
    btn.disabled = false;
  }
}
