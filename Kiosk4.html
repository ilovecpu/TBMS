<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%232e7d32'/%3E%3Cg transform='translate(8,10) scale(0.09375)'%3E%3Cpath fill='%23fff' d='M0 192c0-35.3 28.7-64 64-64c.5 0 1.1 0 1.6 0C73 91.5 105.3 64 144 64c15 0 29 4.1 40.9 11.2C198.2 49.6 225.1 32 256 32s57.8 17.6 71.1 43.2C339 68.1 353 64 368 64c38.7 0 71 27.5 78.4 64c.5 0 1.1 0 1.6 0c35.3 0 64 28.7 64 64c0 11.7-3.1 22.6-8.6 32H8.6C3.1 214.6 0 203.7 0 192zm0 91.4C0 268.3 12.3 256 27.4 256H484.6c15.1 0 27.4 12.3 27.4 27.4c0 70.5-44.4 130.7-106.7 154.1L403.5 452c-2 16-15.6 28-31.8 28H140.2c-16.1 0-29.8-12-31.8-28l-1.8-14.4C44.4 414.1 0 353.9 0 283.4z'/%3E%3C/g%3E%3C/svg%3E">
<title>The Bap — Kiosk 4</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#111;--accent:#e84393;--bg:#f5f5f5;--card:#fff;--border:#e0e0e0;--text:#2d3436;--text-light:#636e72;--success:#27ae60;--danger:#e74c3c;--warning:#f39c12;--radius:14px;--shadow:0 2px 12px rgba(0,0,0,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);min-height:100vh;color:var(--text)}
.fs-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:2000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;color:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent}
.fs-overlay .fs-icon{font-size:72px;animation:fsPulse 2s infinite}
.fs-overlay h2{font-size:28px;font-weight:700}
.fs-overlay p{font-size:15px;opacity:.6}
@keyframes fsPulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
/* ===== Store Selection ===== */
.store-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:20px}
.store-screen h1{font-size:28px;font-weight:800;color:var(--primary);margin-bottom:4px}
.store-screen p{font-size:14px;color:var(--text-light);margin-bottom:12px}
.store-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:420px}
.store-card{padding:28px 16px;border-radius:var(--radius);text-align:center;cursor:pointer;transition:all .2s;border:3px solid transparent;color:#fff;font-weight:700;font-size:18px;box-shadow:var(--shadow)}
.store-card:active{transform:scale(.96)}
.store-card .icon{font-size:36px;margin-bottom:8px;display:block}
.store-card .sub{font-size:11px;font-weight:500;opacity:.85;margin-top:4px}
/* ===== PIN Modal ===== */
.pin-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;align-items:center;justify-content:center}
.pin-overlay.show{display:flex}
.pin-box{background:#fff;border-radius:20px;padding:30px;max-width:340px;width:90%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.3)}
.pin-box h3{font-size:18px;margin-bottom:4px}
.pin-box .sub{font-size:13px;color:var(--text-light);margin-bottom:20px}
.pin-dots{display:flex;gap:12px;justify-content:center;margin-bottom:20px}
.pin-dots .dot{width:18px;height:18px;border-radius:50%;border:2px solid #ddd;background:#fff;transition:all .2s}
.pin-dots .dot.filled{background:var(--primary);border-color:var(--primary)}
.pin-dots .dot.error{background:var(--danger);border-color:var(--danger)}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px;margin:0 auto}
.pin-key{width:72px;height:56px;border-radius:12px;border:2px solid var(--border);background:#fff;font-size:22px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;margin:0 auto;transition:all .15s}
.pin-key:active{background:#f0f0f0;transform:scale(.95)}
.pin-key.accent{background:var(--accent);color:#fff;border-color:var(--accent)}
/* ===== Menu Screen ===== */
.menu-screen{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:24px}
.menu-screen h2{font-size:22px;font-weight:800}
.menu-screen .sub{font-size:13px;color:var(--text-light)}
.menu-btn{width:280px;padding:36px 24px;border-radius:20px;border:none;font-size:20px;font-weight:700;cursor:pointer;font-family:inherit;color:#fff;display:flex;align-items:center;gap:16px;justify-content:center;box-shadow:var(--shadow);transition:all .2s}
.menu-btn:active{transform:scale(.97)}
.menu-btn .menu-icon{font-size:36px}
.menu-back{padding:12px 24px;border-radius:10px;border:2px solid var(--border);background:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px}
.menu-back:active{background:#f0f0f0}
/* ===== Status Bar ===== */
.status-bar{position:fixed;top:0;left:0;right:0;height:54px;display:flex;align-items:center;padding:0 14px;font-size:11px;font-weight:600;color:#fff;z-index:999;gap:10px}
.status-bar .store-label{font-size:20px;font-weight:800;letter-spacing:-.3px;text-shadow:0 1px 3px rgba(0,0,0,.3)}
.status-bar .right{margin-left:auto;display:flex;gap:8px;align-items:center}
.status-bar button{background:rgba(255,255,255,.2);border:none;color:#fff;padding:8px 16px;border-radius:10px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:700;display:flex;align-items:center;gap:6px;backdrop-filter:blur(4px)}
.status-bar button:active{background:rgba(255,255,255,.35);transform:scale(.96)}
/* ===== Main Layout ===== */
.main-wrap{display:none;padding-top:58px;padding-bottom:80px;max-width:700px;margin:0 auto;width:100%}
.diary-header{padding:14px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.diary-header h2{font-size:16px;font-weight:700;flex:1;color:var(--text-light)}
.main-tabs{display:flex;gap:4px;background:#f0f0f0;border-radius:10px;padding:3px}
.main-tab{padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;background:transparent;color:#999;transition:all .2s}
.main-tab.active{background:#fff;color:#333;box-shadow:0 1px 4px rgba(0,0,0,.1)}
/* Monthly main view */
.main-month-nav{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:14px}
.main-month-nav button{width:38px;height:38px;border-radius:10px;border:2px solid var(--border);background:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.main-month-nav button:active{background:#f0f0f0}
.main-month-nav .month-label{font-size:18px;font-weight:800;min-width:160px;text-align:center}
.diary-header .date-nav{display:flex;align-items:center;gap:6px}
.diary-header .date-nav button{width:36px;height:36px;border-radius:10px;border:2px solid var(--border);background:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.diary-header .date-nav button:active{background:#f0f0f0}
.diary-header .date-display{font-size:15px;font-weight:700;min-width:140px;text-align:center}
/* ===== Sections / Accordion ===== */
.section{margin:8px 12px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.section-head{padding:16px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;font-weight:700;font-size:15px;border-bottom:1px solid transparent;transition:all .2s}
.section-head:active{background:#f9f9f9}
.section-head .num{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}
.section-head .title{flex:1}
.section-head .status-icon{font-size:18px;color:#ccc;transition:all .2s}
.section-head .status-icon.done{color:var(--success)}
.section-head .chevron{font-size:14px;color:#aaa;transition:transform .2s}
.section.open .section-head{border-bottom:1px solid var(--border)}
.section.open .chevron{transform:rotate(180deg)}
.section-body{display:none;padding:16px 18px}
.section.open .section-body{display:block}
/* ===== Check Items ===== */
.check-list{display:flex;flex-direction:column;gap:10px}
.check-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:#f8f9fa;border-radius:10px;font-size:14px;font-weight:500}
.check-item .label{flex:1;line-height:1.4}
.toggle{position:relative;width:56px;height:32px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle .slider{position:absolute;inset:0;background:#ddd;border-radius:16px;cursor:pointer;transition:all .2s}
.toggle .slider::before{content:'';position:absolute;width:26px;height:26px;border-radius:50%;background:#fff;top:3px;left:3px;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle input:checked+.slider{background:var(--success)}
.toggle input:checked+.slider::before{transform:translateX(24px)}
/* ===== Fridge Temps ===== */
.fridge-grid{display:flex;flex-direction:column;gap:8px}
.fridge-row{display:grid;grid-template-columns:1fr 80px 80px;gap:8px;align-items:center;padding:8px 12px;background:#f8f9fa;border-radius:10px}
.fridge-row.header{background:none;font-weight:700;font-size:12px;color:var(--text-light);padding:4px 12px}
.fridge-row .name{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.fridge-row .name i{font-size:14px}
.temp-input{width:100%;padding:8px;border:2px solid var(--border);border-radius:8px;font-size:16px;font-weight:600;text-align:center;font-family:inherit;background:#fff}
.temp-input:focus{border-color:var(--accent);outline:none}
.fridge-type-label{font-size:12px;font-weight:800;color:#fff;padding:6px 14px;border-radius:8px;margin:8px 0 4px}
/* ===== Data tables ===== */
.data-table{width:100%;border-collapse:separate;border-spacing:0 6px}
.data-table th{font-size:11px;font-weight:700;color:var(--text-light);text-align:left;padding:4px 8px}
.data-table td{padding:6px 8px;background:#f8f9fa;font-size:13px}
.data-table td:first-child{border-radius:8px 0 0 8px}
.data-table td:last-child{border-radius:0 8px 8px 0}
.data-table input[type=text],.data-table input[type=number]{width:100%;padding:8px;border:2px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:#fff}
.data-table input:focus{border-color:var(--accent);outline:none}
.mini-toggle{position:relative;width:44px;height:26px;flex-shrink:0;display:inline-block}
.mini-toggle input{opacity:0;width:0;height:0}
.mini-toggle .slider{position:absolute;inset:0;background:#ddd;border-radius:13px;cursor:pointer;transition:all .2s}
.mini-toggle .slider::before{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:3px;left:3px;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.mini-toggle input:checked+.slider{background:var(--success)}
.mini-toggle input:checked+.slider::before{transform:translateX(18px)}
.add-row-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px;border:2px dashed var(--border);border-radius:10px;background:none;cursor:pointer;font-size:14px;font-weight:600;color:var(--text-light);width:100%;margin-top:8px;font-family:inherit}
.add-row-btn:active{background:#f0f0f0}
.del-btn{width:28px;height:28px;border-radius:50%;border:none;background:#fee;color:var(--danger);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.del-btn:active{background:#fdd}
/* ===== Hold Temp ===== */
.hold-grid{width:100%;overflow-x:auto}
.hold-table{width:100%;border-collapse:collapse;font-size:12px}
.hold-table th{padding:8px 4px;font-weight:700;font-size:11px;color:var(--text-light);text-align:center;border-bottom:2px solid var(--border);white-space:nowrap}
.hold-table th:first-child{text-align:left;min-width:100px}
.hold-table td{padding:4px;text-align:center;border-bottom:1px solid #f0f0f0}
.hold-table td:first-child{text-align:left;font-weight:600;font-size:12px}
.hold-input{width:52px;padding:6px 2px;border:2px solid var(--border);border-radius:6px;font-size:14px;font-weight:600;text-align:center;font-family:inherit}
.hold-input:focus{border-color:var(--accent);outline:none}
.hold-input.newly{border-color:var(--warning);background:#fff8e1}
.n-check{display:flex;align-items:center;justify-content:center;gap:2px;margin-top:2px}
.n-check label{font-size:10px;font-weight:700;color:var(--warning)}
.n-check input{width:14px;height:14px;accent-color:var(--warning)}
/* ===== Extra ===== */
.textarea-wrap textarea{width:100%;padding:14px;border:2px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;resize:vertical;min-height:80px}
.textarea-wrap textarea:focus{border-color:var(--accent);outline:none}
.signoff-row{display:flex;align-items:center;gap:12px;padding:12px;background:#f8f9fa;border-radius:10px}
.signoff-row label{font-weight:600;font-size:14px;min-width:60px}
.signoff-row input{flex:1;padding:10px;border:2px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit}
.signoff-row input:focus{border-color:var(--accent);outline:none}
/* ===== Bottom Save Bar ===== */
.save-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:10px 16px;display:flex;gap:10px;z-index:900;justify-content:center}
.save-bar button{padding:16px 28px;border-radius:12px;border:none;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px}
.save-bar button:active{transform:scale(.97)}
.btn-save{background:var(--accent);color:#fff;flex:1;max-width:320px;justify-content:center}
.btn-records{background:#2d3436;color:#fff;padding:16px 22px !important}
/* ===== Inspector ===== */
.inspector-overlay{display:none;position:fixed;inset:0;background:#fff;z-index:2000;overflow-y:auto}
.inspector-overlay.show{display:block}
.inspector-bar{position:sticky;top:0;background:#2d3436;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;z-index:10;flex-wrap:wrap}
.inspector-bar h3{flex:1;font-size:17px;min-width:140px}
.inspector-bar button{padding:10px 18px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.insp-tabs{display:flex;gap:4px;background:rgba(255,255,255,.15);border-radius:10px;padding:3px}
.insp-tab{padding:7px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;background:transparent;color:rgba(255,255,255,.7);transition:all .2s}
.insp-tab.active{background:#fff;color:#333}
.inspector-content{padding:20px;max-width:800px;margin:0 auto}
.insp-section{margin-bottom:20px}
.insp-section h4{font-size:14px;font-weight:700;padding:8px 14px;border-radius:8px;color:#fff;margin-bottom:8px}
.insp-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:4px}
.insp-table th,.insp-table td{padding:6px 10px;border:1px solid #ddd;text-align:left}
.insp-table th{background:#f5f5f5;font-weight:700;font-size:11px}
.insp-table .yes{color:var(--success);font-weight:700}
.insp-table .no{color:var(--danger);font-weight:700}
.insp-date-nav{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:16px}
.insp-date-nav button{width:38px;height:38px;border-radius:10px;border:2px solid #ddd;background:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.insp-date-nav button:active{background:#f0f0f0}
.insp-date-nav input[type=date]{padding:8px 12px;border:2px solid #ddd;border-radius:10px;font-size:15px;font-weight:700;font-family:inherit;text-align:center}
.insp-month-nav{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:16px}
.insp-month-nav button{width:38px;height:38px;border-radius:10px;border:2px solid #ddd;background:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.insp-month-nav button:active{background:#f0f0f0}
.insp-month-nav .month-label{font-size:18px;font-weight:800;min-width:160px;text-align:center}
.insp-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px}
.insp-cal .day-header{text-align:center;font-size:11px;font-weight:700;color:var(--text-light);padding:6px 0}
.insp-cal .day-cell{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:14px;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .15s;position:relative;min-height:44px}
.insp-cal .day-cell:hover{border-color:#ddd}
.insp-cal .day-cell.empty{cursor:default}
.insp-cal .day-cell.empty:hover{border-color:transparent}
.insp-cal .day-cell.has-entry{background:#e8f5e9;border-color:#c8e6c9}
.insp-cal .day-cell.has-entry:hover{border-color:var(--success)}
.insp-cal .day-cell.no-entry{background:#fff3e0;border-color:#ffe0b2}
.insp-cal .day-cell.today{box-shadow:0 0 0 2px var(--accent)}
.insp-cal .day-cell .dot-indicator{width:6px;height:6px;border-radius:50%;margin-top:2px}
.insp-cal .day-cell.has-entry .dot-indicator{background:var(--success)}
.insp-cal .day-cell.no-entry .dot-indicator{background:var(--warning)}
.insp-month-summary{margin-bottom:20px}
.insp-month-summary .stat-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.insp-month-summary .stat-card{padding:14px;border-radius:12px;text-align:center}
.insp-month-summary .stat-card .num{font-size:28px;font-weight:800}
.insp-month-summary .stat-card .lbl{font-size:11px;font-weight:600;margin-top:2px}
/* ===== Stock Check ===== */
.stock-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:1500;overflow-y:auto}
.stock-screen.show{display:block}
.stock-bar{position:sticky;top:0;z-index:10;padding:12px 16px;display:flex;align-items:center;gap:12px;color:#fff;flex-wrap:wrap}
.stock-bar h3{font-size:17px;font-weight:800;flex:1}
.stock-bar button{padding:10px 18px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.stock-bar button:active{transform:scale(.97)}
.cat-tabs{display:flex;gap:4px;padding:4px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.cat-tab{padding:8px 16px;border-radius:20px;border:2px solid var(--border);background:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .2s}
.cat-tab.active{color:#fff;border-color:transparent}
.stock-items{padding:8px 12px 100px}
.stock-item{display:flex;align-items:center;gap:12px;padding:14px 16px;margin-bottom:8px;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow)}
.stock-item .item-photo{width:50px;height:50px;border-radius:10px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden;flex-shrink:0;position:relative;cursor:pointer}
.stock-item .item-photo img{width:100%;height:100%;object-fit:cover}
.stock-item .item-photo .photo-badge{position:absolute;bottom:-2px;right:-2px;width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.stock-item .item-info{flex:1;min-width:0}
.stock-item .item-name{font-size:15px;font-weight:700}
.stock-item .item-detail{font-size:12px;color:var(--text-light);margin-top:2px}
.stock-item .item-min{font-size:11px;font-weight:600;margin-top:2px}
.stock-item .item-min.low{color:var(--danger)}
.stock-item .item-min.ok{color:var(--success)}
.qty-control{display:flex;align-items:center;gap:0;border:2px solid var(--border);border-radius:10px;overflow:hidden}
.qty-btn{width:42px;height:42px;border:none;background:#f5f5f5;font-size:20px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center}
.frac-btn{padding:3px 10px;border:1.5px solid var(--border);border-radius:6px;background:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--primary)}
.frac-btn:active{background:var(--accent);color:#fff;border-color:var(--accent)}
.qty-btn:active{background:#e0e0e0}
.qty-btn.minus{color:var(--danger)}
.qty-btn.plus{color:var(--success)}
.qty-val{width:52px;text-align:center;font-size:18px;font-weight:800;border:none;background:#fff;font-family:inherit;-moz-appearance:textfield}
.qty-val::-webkit-inner-spin-button,.qty-val::-webkit-outer-spin-button{-webkit-appearance:none}
.qty-val:focus{outline:none;background:#fff8e1}
.stock-save-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:10px 16px;display:flex;gap:10px;z-index:1600;justify-content:center}
.stock-save-bar button{padding:16px 28px;border-radius:12px;border:none;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px;flex:1;max-width:320px;justify-content:center}
.stock-save-bar button:active{transform:scale(.97)}
.stock-cat-header{padding:10px 16px;font-size:14px;font-weight:800;color:#fff;border-radius:10px;margin:12px 0 6px;display:flex;align-items:center;gap:8px}
/* ===== Toast ===== */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;color:#fff;z-index:3000;box-shadow:0 4px 20px rgba(0,0,0,.2);opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.toast.success{background:var(--success)}
.toast.error{background:var(--danger)}
/* ===== Loading ===== */
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,.8);z-index:3000;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.loading-overlay.show{display:flex}
.loading-overlay .spinner{width:40px;height:40px;border:4px solid #ddd;border-top:4px solid var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* ===== Dropdown select ===== */
.action-select{padding:8px;border:2px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:#fff;min-width:90px}
.action-select:focus{border-color:var(--accent);outline:none}
/* ===== Print ===== */
@page{size:A4 portrait;margin:8mm 10mm}
@media print{
  *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important}
  body{background:#fff !important;font-size:8.5px !important;padding:0 !important;margin:0 !important}
  .status-bar,.save-bar,.inspector-bar,.date-nav button,.store-screen,.main-wrap,
  .insp-date-nav button,.insp-month-nav button,.insp-tabs,.insp-date-nav,.insp-month-nav,
  .insp-cal,.insp-month-summary,.stat-cards,.no-print,.main-tabs,#monthlyArea,
  .stock-screen,.menu-screen,.pin-overlay,.loading-overlay,
  button{display:none !important}
  .inspector-overlay{position:static !important;display:block !important}
  .inspector-content{padding:4mm 0 !important;max-width:100% !important}
  .insp-section{margin-bottom:3px !important;page-break-inside:avoid}
  .insp-section h4{font-size:9px !important;padding:2px 6px !important;margin-bottom:2px !important;border-radius:2px !important}
  .insp-table{margin-bottom:2px !important}
  .insp-table th,.insp-table td{padding:1.5px 4px !important;font-size:8px !important;border:1px solid #ccc !important}
  .insp-table th{font-size:7.5px !important}
}
</style>
</head>
<body>

<!-- ===== STORE SELECTION ===== -->
<div id="storeScreen" class="store-screen">
  <div style="text-align:center">
    <div style="font-size:48px;margin-bottom:8px">📋</div>
    <h1>The Bap Management System</h1><p style="font-size:11px;color:#999;margin-top:2px">Ver1.7</p>
    <p id="storeMsg">Loading stores...</p>
  </div>
  <div class="store-grid" id="storeGrid"></div>
  <div style="margin-top:32px;text-align:center;font-size:11px;color:#999;line-height:1.6">
    <div>&copy; 2026 Thebap Ltd. All rights reserved.</div>
    <div>Programmed by DJ Kim</div>
  </div>
</div>

<!-- ===== PIN OVERLAY ===== -->
<div id="pinOverlay" class="pin-overlay">
  <div class="pin-box">
    <h3 id="pinTitle">Enter PIN</h3>
    <div class="sub" id="pinSub">Last 4 digits of store phone</div>
    <div class="pin-dots" id="pinDots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <div class="pin-keypad">
      <button class="pin-key" onclick="pinKey('1')">1</button>
      <button class="pin-key" onclick="pinKey('2')">2</button>
      <button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button>
      <button class="pin-key" onclick="pinKey('5')">5</button>
      <button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button>
      <button class="pin-key" onclick="pinKey('8')">8</button>
      <button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key" onclick="pinClear()" style="font-size:14px"><i class="fas fa-backspace"></i></button>
      <button class="pin-key" onclick="pinKey('0')">0</button>
      <button class="pin-key" onclick="pinCancel()" style="font-size:14px;color:var(--danger)"><i class="fas fa-times"></i></button>
    </div>
  </div>
</div>

<!-- ===== MENU SCREEN ===== -->
<div id="menuScreen" class="menu-screen">
  <div style="text-align:center">
    <h2 id="menuTitle">Select Function</h2>
    <div class="sub" id="menuSub">—</div>
  </div>
  <button class="menu-btn" style="background:linear-gradient(135deg,#1b5e20,#4caf50)" onclick="openDiary()">
    <span class="menu-icon">📝</span> Daily Diary
  </button>
  <button class="menu-btn" style="background:linear-gradient(135deg,#1565c0,#42a5f5)" onclick="openStockCheck()">
    <span class="menu-icon">📦</span> Stock Check
  </button>
  <button class="menu-back" onclick="backToStores()"><i class="fas fa-arrow-left"></i> Back to Stores</button>
</div>

<!-- ===== MAIN DIARY ===== -->
<div id="statusBar" class="status-bar" style="display:none">
  <span class="store-label" id="storeName">—</span>
  <div class="right">
    <button onclick="showInspector()"><i class="fas fa-folder-open"></i> Past Records</button>
    <button onclick="backToMenu()" style="background:rgba(255,255,255,.35)"><i class="fas fa-th-large"></i> Menu</button>
  </div>
</div>

<div id="mainWrap" class="main-wrap">
  <div class="diary-header">
    <div style="display:flex;align-items:center;gap:8px;flex:1">
      <div class="main-tabs" id="mainTabs">
        <button class="main-tab active" id="mainTabDaily" onclick="switchMainTab('daily')"><i class="fas fa-calendar-day"></i> Daily</button>
        <button class="main-tab" id="mainTabMonthly" onclick="switchMainTab('monthly')"><i class="fas fa-calendar-alt"></i> Monthly</button>
      </div>
    </div>
    <div class="date-nav" id="dailyDateNav">
      <button onclick="changeDate(-1)"><i class="fas fa-chevron-left"></i></button>
      <div class="date-display" id="dateDisplay">—</div>
      <button onclick="changeDate(1)"><i class="fas fa-chevron-right"></i></button>
    </div>
  </div>
  <div id="sectionsArea"></div>
  <div id="monthlyArea" style="display:none"></div>
</div>

<!-- ===== SAVE BAR ===== -->
<div id="saveBar" class="save-bar" style="display:none">
  <button class="btn-save" onclick="saveDiary()"><i class="fas fa-save"></i> Save Diary</button>
</div>

<!-- ===== INSPECTOR OVERLAY ===== -->
<div id="inspectorOv" class="inspector-overlay">
  <div class="inspector-bar">
    <h3><i class="fas fa-folder-open"></i> Past Records</h3>
    <div class="insp-tabs">
      <button class="insp-tab active" id="tabDaily" onclick="switchInspTab('daily')"><i class="fas fa-calendar-day"></i> Daily</button>
      <button class="insp-tab" id="tabMonthly" onclick="switchInspTab('monthly')"><i class="fas fa-calendar-alt"></i> Monthly</button>
    </div>
    <button style="background:#fff;color:#333" onclick="printInspEntry()"><i class="fas fa-print"></i> Print</button>
    <button style="background:var(--accent);color:#fff" onclick="closeInspector()"><i class="fas fa-times"></i> Close</button>
  </div>
  <div class="inspector-content" id="inspectorContent"></div>
</div>

<!-- ===== STOCK CHECK SCREEN ===== -->
<div id="stockScreen" class="stock-screen">
  <div class="stock-bar" id="stockBar">
    <h3><i class="fas fa-boxes-stacked"></i> Stock Check</h3>
    <button style="background:rgba(255,255,255,.2);color:#fff" onclick="closeStockCheck()"><i class="fas fa-th-large"></i> Menu</button>
  </div>
  <div id="stockDateBanner" style="padding:12px 16px;background:#fff;border-bottom:2px solid #eee;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px"></div>
  <div class="cat-tabs" id="catTabs"></div>
  <div class="stock-items" id="stockItems"></div>
  <div class="stock-save-bar">
    <button style="background:var(--success);color:#fff" onclick="saveStockCheck()"><i class="fas fa-save"></i> Save Stock Count</button>
  </div>
</div>

<!-- ===== CONFIRM DIALOG ===== -->
<div id="confirmOv" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:9999;justify-content:center;align-items:center">
  <div style="background:#fff;border-radius:16px;padding:28px 24px;max-width:340px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.3)">
    <div id="confirmIcon" style="font-size:48px;margin-bottom:12px"></div>
    <div id="confirmTitle" style="font-size:18px;font-weight:800;margin-bottom:8px"></div>
    <div id="confirmMsg" style="font-size:14px;color:#666;margin-bottom:24px;line-height:1.5"></div>
    <div style="display:flex;gap:12px">
      <button id="confirmNo" onclick="_confirmResolve(false)" style="flex:1;padding:14px;border-radius:12px;border:2px solid #ddd;background:#f5f5f5;font-size:16px;font-weight:700;color:#666;cursor:pointer">No</button>
      <button id="confirmYes" onclick="_confirmResolve(true)" style="flex:1;padding:14px;border-radius:12px;border:none;background:#1b5e20;color:#fff;font-size:16px;font-weight:700;cursor:pointer">Yes</button>
    </div>
  </div>
</div>

<!-- ===== LOADING ===== -->
<div id="loadingOv" class="loading-overlay">
  <div class="spinner"></div>
  <div id="loadingMsg" style="font-weight:600;color:var(--text-light)">Loading...</div>
</div>

<!-- ===== TOAST ===== -->
<div id="toast" class="toast"></div>

<script>
// ============================================================
//  CONFIG
// ============================================================
const DEFAULT_API='https://script.google.com/macros/s/AKfycbyWN7f8SUpv2jb-S4AaFsLiaHbd4ssG-YdirHYS5drxR4vyPbNj5BZf7ssFVJu69B0v/exec';
const API_URL=DEFAULT_API;
const API_KEY='tBaP2026xKr!mGt9Qz';

const DEFAULT_COLORS=['#1b5e20','#1565c0','#6a1b9a','#e65100','#00838f','#c62828','#4527a0','#00695c','#bf360c','#283593'];
const DEFAULT_LIGHT=['#4caf50','#42a5f5','#ab47bc','#ff9800','#26c6da','#ef5350','#7e57c2','#26a69a','#ff7043','#5c6bc0'];
const DEFAULT_ICONS=['🟢','🔵','🟣','🟠','🔷','🔴','💜','🟩','🟧','💙'];
let STORE_COLORS={};
let STORE_NAMES={};
let storeList=[];

const OPENING_CHECKS=[
  {key:'petFree',label:'a) Premises are free from signs of pest activity'},
  {key:'equipOk',label:'b) All equipment in good working order'},
  {key:'hotWater',label:'c) Hot water, soap and towels available'},
  {key:'aprons',label:'d) Clean aprons available'},
  {key:'premisesClean',label:'e) Premises clean and tidy'},
  {key:'sanitiser',label:'f) Enough sanitiser and clean cloths'},
  {key:'foodInDate',label:'g) All food is in date'},
  {key:'structureOk',label:'h) Structure of premises is OK'}
];
const CLOSING_CHECKS=[
  {key:'outOfDate',label:'a) Out-of-date food discarded'},
  {key:'wasteBagged',label:'b) Waste bagged and removed'},
  {key:'surfacesCleaned',label:'c) All surfaces and equipment cleaned'},
  {key:'foodStored',label:'d) All food properly stored / covered'},
  {key:'premisesSecure',label:'e) Premises secured'}
];
const EXTRA_CHECKS=[
  {key:'deepCleaning',label:'Deep Cleaning'},
  {key:'extractionCleaning',label:'Extraction Cleaning'},
  {key:'calibration',label:'Calibration'}
];
const HOLD_TIMES=['13:00','15:00','17:00','19:00'];

// ============================================================
//  STATE
// ============================================================
let currentStore='';
let currentStoreObj=null;
let currentDate=new Date();
let diaryConfig=[];
let diaryEntry=null;
let allEntries=[];
let _dirty=false;
let mainTab='daily';
let mainMonth=new Date();
let pinCode='';
let pinCallback=null;

// Confirm dialog
let _confirmResolveFunc=null;
function _confirmResolve(val){$('confirmOv').style.display='none';if(_confirmResolveFunc)_confirmResolveFunc(val);_confirmResolveFunc=null;}
function showConfirm(icon,title,msg){
  return new Promise(resolve=>{
    _confirmResolveFunc=resolve;
    $('confirmIcon').textContent=icon;
    $('confirmTitle').textContent=title;
    $('confirmMsg').textContent=msg;
    $('confirmOv').style.display='flex';
  });
}

// Stock Check state
let stockTemplates=[];
let storeStockItems=[];
let stockQty={};  // itemId → qty
let stockCatOrder=[];
let stockLoaded=false;
let currentStockCat='';

const $=id=>document.getElementById(id);

// ============================================================
//  API
// ============================================================
async function apiGet(action){try{const r=await fetch(API_URL+'?action='+action+'&apikey='+encodeURIComponent(API_KEY),{redirect:'follow'});return await r.json();}catch(e){return null;}}
async function apiPost(data){try{data.apikey=API_KEY;const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(data),redirect:'follow'});return await r.json();}catch(e){return null;}}
function bgPost(data){data.apikey=API_KEY;fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(data),redirect:'follow'}).catch(()=>{});}

function showLoading(msg){$('loadingMsg').textContent=msg||'Loading...';$('loadingOv').classList.add('show');}
function hideLoading(){$('loadingOv').classList.remove('show');}

// ============================================================
//  LOAD STORES FROM SERVER
// ============================================================
async function loadStores(){
  $('storeMsg').textContent='Loading stores...';
  const res=await apiGet('getSheet&sheet=Stores');
  if(res&&res.data){
    storeList=res.data.filter(s=>s.active===true||s.active==='true'||s.active==='TRUE');
  }
  if(storeList.length===0){
    storeList=[
      {code:'PAB',name:'Pick A Bap',address:'Farnborough',phone:''},
      {code:'TBS',name:'The Bap',address:'Swindon',phone:''},
      {code:'TBR',name:'The Bap',address:'Reading',phone:''},
      {code:'TBB',name:'The Bap',address:'Bristol',phone:''},
      {code:'TBO',name:'The Bap',address:'Oxford',phone:''}
    ];
  }
  storeList.forEach((s,i)=>{
    const ci=i%DEFAULT_COLORS.length;
    STORE_COLORS[s.code]=STORE_COLORS[s.code]||DEFAULT_COLORS[ci];
    const addr=s.address||'';
    const city=addr.split(',')[0].trim()||addr.split('\n')[0].trim()||'';
    STORE_NAMES[s.code]=s.name+(city?' — '+city:'');
  });
  renderStoreGrid();
}
function renderStoreGrid(){
  const grid=$('storeGrid');
  let html='';
  storeList.forEach((s,i)=>{
    const ci=i%DEFAULT_COLORS.length;
    const dark=STORE_COLORS[s.code]||DEFAULT_COLORS[ci];
    const light=DEFAULT_LIGHT[ci]||dark;
    const icon=DEFAULT_ICONS[ci]||'📍';
    const addr=s.address||'';
    const city=addr.split(',')[0].trim()||addr.split('\n')[0].trim()||'';
    const isLast=(i===storeList.length-1 && storeList.length%2===1);
    html+=`<div class="store-card" style="background:linear-gradient(135deg,${dark},${light})${isLast?';grid-column:1/3':''}" onclick="selectStore('${s.code}')">
      <span class="icon">${icon}</span>${s.name}<div class="sub">${city}</div>
    </div>`;
  });
  grid.innerHTML=html;
  $('storeMsg').textContent='Select your store to begin';
}
loadStores();

// ============================================================
//  PIN AUTH
// ============================================================
function selectStore(code){
  const store=storeList.find(s=>s.code===code);
  if(!store)return;
  currentStoreObj=store;
  const phone=(store.phone||'').replace(/\D/g,'');
  if(phone.length<4){
    // No phone set — skip PIN
    currentStore=code;
    showMenu();
    return;
  }
  const pin=phone.slice(-4);
  $('pinTitle').textContent=store.name||code;
  $('pinSub').textContent='Enter store PIN (last 4 digits of phone)';
  pinCode='';
  renderPinDots();
  pinCallback=()=>{
    if(pinCode===pin){
      $('pinOverlay').classList.remove('show');
      currentStore=code;
      showMenu();
    }else{
      // Show error
      document.querySelectorAll('#pinDots .dot').forEach(d=>d.classList.add('error'));
      setTimeout(()=>{
        pinCode='';
        renderPinDots();
      },500);
    }
  };
  $('pinOverlay').classList.add('show');
}
function pinKey(n){
  if(pinCode.length>=4)return;
  pinCode+=n;
  renderPinDots();
  if(pinCode.length===4&&pinCallback)setTimeout(pinCallback,150);
}
function pinClear(){
  if(pinCode.length>0)pinCode=pinCode.slice(0,-1);
  renderPinDots();
}
function pinCancel(){
  pinCode='';pinCallback=null;
  $('pinOverlay').classList.remove('show');
}
function renderPinDots(){
  const dots=document.querySelectorAll('#pinDots .dot');
  dots.forEach((d,i)=>{
    d.classList.remove('filled','error');
    if(i<pinCode.length)d.classList.add('filled');
  });
}

// ============================================================
//  MENU SCREEN
// ============================================================
function showMenu(){
  $('storeScreen').style.display='none';
  $('menuScreen').style.display='flex';
  $('menuTitle').textContent=STORE_NAMES[currentStore]||currentStore;
  $('menuSub').textContent='Select function';
  // Reset diary/stock states
  stockLoaded=false;
}
function backToStores(){
  $('storeScreen').style.display='flex';
  $('menuScreen').style.display='none';
  $('statusBar').style.display='none';
  $('mainWrap').style.display='none';
  $('saveBar').style.display='none';
  $('stockScreen').classList.remove('show');
  currentStore='';currentStoreObj=null;diaryEntry=null;allEntries=[];stockLoaded=false;
}
function backToMenu(){
  $('statusBar').style.display='none';
  $('mainWrap').style.display='none';
  $('saveBar').style.display='none';
  $('stockScreen').classList.remove('show');
  $('menuScreen').style.display='flex';
}

// ============================================================
//  OPEN DIARY
// ============================================================
async function openDiary(){
  $('menuScreen').style.display='none';
  $('statusBar').style.display='flex';
  $('statusBar').style.background=STORE_COLORS[currentStore];
  $('mainWrap').style.display='block';
  $('saveBar').style.display='flex';
  $('storeName').textContent=STORE_NAMES[currentStore];
  mainTab='daily';
  $('mainTabDaily').className='main-tab active';
  $('mainTabMonthly').className='main-tab';
  $('dailyDateNav').style.display='flex';
  $('sectionsArea').style.display='block';
  $('monthlyArea').style.display='none';

  showToast('Loading data...','success');
  const res=await apiGet('getStoreData&store='+currentStore+'&sheets=DiaryConfig,DiaryEntry');
  if(res&&res.data){
    diaryConfig=(res.data.DiaryConfig||[]).filter(c=>c.active===true||c.active==='true'||c.active==='TRUE');
    allEntries=res.data.DiaryEntry||[];
  }else{
    diaryConfig=[];allEntries=[];
  }
  setDate(new Date());
}

// ============================================================
//  STOCK CHECK
// ============================================================
let _stockDataDate='';
async function openStockCheck(){
  $('menuScreen').style.display='none';
  $('stockScreen').classList.add('show');
  $('stockBar').style.background=STORE_COLORS[currentStore];
  showLoading('Loading stock data...');
  const [tplRes,ssRes,coRes]=await Promise.all([
    apiGet('getSheet&sheet=StockTemplate'),
    apiGet('getStoreData&store='+currentStore+'&sheets=StoreStock,StockCount'),
    apiGet('getSetting&key=catOrder')
  ]);
  if(tplRes&&tplRes.data)stockTemplates=tplRes.data;
  if(ssRes&&ssRes.data&&ssRes.data.StoreStock)storeStockItems=ssRes.data.StoreStock;
  const stockCounts=(ssRes&&ssRes.data&&ssRes.data.StockCount)||[];
  if(coRes&&coRes.value)stockCatOrder=coRes.value;
  else stockCatOrder=[];
  // Find most recent date with valid (non-all-zero) data
  // Today: check StoreStock (live). Past dates: check StockCount.
  const today=new Date().toISOString().split('T')[0];
  const _byDate={};
  stockCounts.forEach(sc=>{if(!_byDate[sc.countDate])_byDate[sc.countDate]=[];_byDate[sc.countDate].push(sc);});
  const pastValidDates=Object.keys(_byDate).filter(dt=>dt!==today&&_byDate[dt].some(r=>(Number(r.qty)||0)>0)).sort();
  const todayHasData=storeStockItems.some(s=>(Number(s.qty)||0)>0);
  let latestDate='';
  if(todayHasData){latestDate=today;}
  else if(pastValidDates.length){latestDate=pastValidDates[pastValidDates.length-1];}
  const latestRecs=(latestDate&&latestDate!==today)?(_byDate[latestDate]||[]):[];
  _stockDataDate=latestDate;
  // Init qty
  stockQty={};
  if(latestDate===today){
    // Use StoreStock live data
    stockTemplates.forEach(t=>{
      const ss=storeStockItems.find(s=>String(s.itemId)===String(t.id));
      stockQty[t.id]=ss?Number(ss.qty)||0:0;
    });
  }else if(latestRecs.length>0){
    // Use StockCount from past date
    stockTemplates.forEach(t=>{
      const rec=latestRecs.find(r=>String(r.itemId)===String(t.id));
      stockQty[t.id]=rec?Number(rec.qty)||0:0;
    });
  }else{
    // No valid data anywhere
    stockTemplates.forEach(t=>{stockQty[t.id]=0;});
  }
  hideLoading();
  currentStockCat='';
  renderStockCatTabs();
  renderStockItems();
  // Show data date in stock bar
  _updateStockBarDate();
}
function _updateStockBarDate(){
  const banner=$('stockDateBanner');if(!banner)return;
  const today=new Date();
  const todayStr=fmtDate(today);
  const todayLabel=today.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const isToday=_stockDataDate===todayStr;
  if(_stockDataDate){
    const d=new Date(_stockDataDate+'T12:00:00');
    const dataLabel=d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'long',year:'numeric'});
    if(isToday){

function fmtQty(n){
  n=Number(n)||0;if(n===0)return'0';
  const w=Math.floor(n);const f=Math.round((n-w)*100);
  let frac='';
  if(f>=45&&f<=55)frac='½';
  else if(f>=30&&f<=36)frac='⅓';
  else if(f>=63&&f<=70)frac='⅔';
  else if(f>=23&&f<=27)frac='¼';
  else if(f>=73&&f<=77)frac='¾';
  else if(f>0)frac='.'+f;
  if(w===0&&frac)return frac;
  if(frac)return w+frac;
  return String(w);
}
function adjQty(id,delta){
  const cur=stockQty[id]||0;
  const whole=Math.floor(cur);const frac=cur-whole;
  const nv=Math.max(0,whole+delta+frac);
  stockQty[id]=nv;
  const el=$('q_'+id);if(el)el.value=nv;
  renderStockItems();
}
function setQty(id,val){
  stockQty[id]=Math.max(0,parseFloat(val)||0);
  renderStockItems();
}
function setFrac(id,frac){
  const cur=stockQty[id]||0;
  const whole=Math.floor(cur);
  stockQty[id]=whole+frac;
  const el=$('q_'+id);if(el)el.value=stockQty[id];
  renderStockItems();
}

let _photoUploading=false;
function triggerPhotoUpload(itemId){
  if(_photoUploading)return;
  let inp=document.getElementById('stockPhotoInput');
  if(!inp){
    inp=document.createElement('input');
    inp.type='file';inp.accept='image/*';inp.capture='environment';
    inp.id='stockPhotoInput';inp.style.display='none';
    document.body.appendChild(inp);
  }
  inp.dataset.itemId=itemId;
  inp.value='';
  // Suppress fullscreen overlay while picking file
  _skipFsOverlay=true;
  inp.onchange=function(){
    _skipFsOverlay=false;
    if(!this.files||!this.files[0]){
      showFsReturnOverlay();
      return;
    }
    const file=this.files[0];
    const iid=this.dataset.itemId;
    compressAndUpload(iid,file);
    // Show tap-to-return overlay (fullscreen needs user gesture)
    showFsReturnOverlay();
  };
  inp.click();
  // If user cancels file picker
  window.addEventListener('focus',function onFocus(){
    window.removeEventListener('focus',onFocus);
    setTimeout(()=>{
      _skipFsOverlay=false;
      if(!document.fullscreenElement&&!document.webkitFullscreenElement){
        showFsReturnOverlay();
      }
    },500);
  });
}

function compressAndUpload(itemId,file){
  const img=new Image();
  const url=URL.createObjectURL(file);
  img.onload=function(){
    URL.revokeObjectURL(url);
    const MAX=300; // max dimension 300px for small file
    let w=img.width,h=img.height;
    if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}
    else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
    const canvas=document.createElement('canvas');
    canvas.width=w;canvas.height=h;
    const ctx=canvas.getContext('2d');
    ctx.drawImage(img,0,0,w,h);
    const dataUrl=canvas.toDataURL('image/jpeg',0.6); // JPEG quality 60%
    // Show local preview
    const tpl=stockTemplates.find(t=>String(t.id)===String(itemId));
    if(tpl)tpl._localPhoto=dataUrl;
    renderStockItems();
    // Upload compressed
    uploadStockPhoto(itemId,dataUrl);
  };
  img.onerror=function(){URL.revokeObjectURL(url);showToast('Failed to read image','error');};
  img.src=url;
}

async function uploadStockPhoto(itemId,dataUrl){
  _photoUploading=true;
  showToast('Uploading photo...','info');
  const base64=dataUrl.split(',')[1];
  try{
    const r=await apiPost({action:'saveItemPhoto',itemId:itemId,photo:base64});
    if(r&&r.fileId){
      const tpl=stockTemplates.find(t=>String(t.id)===String(itemId));
      if(tpl){tpl.photo=r.fileId;delete tpl._localPhoto;}
      renderStockItems();
      showToast('Photo saved!','success');
    }else{
      showToast('Photo upload failed: '+(r?.error||''),'error');
    }
  }catch(e){
    showToast('Upload error','error');
  }
  _photoUploading=false;
}

      <div class="num" style="background:${clr}">${num}</div>

function toggleSection(n){const el=$('sec_'+n);if(el)el.classList.toggle('open');}
function isSectionDone(n){
  if(!diaryEntry)return false;
  switch(n){
    case 1: return diaryEntry.openChecks&&Object.keys(diaryEntry.openChecks).length>0;
    case 2: return diaryEntry.fridgeTemps&&diaryEntry.fridgeTemps.length>0;
    case 3: return diaryEntry.deliveries&&diaryEntry.deliveries.length>0;
    case 4: return diaryEntry.cookingTemps&&diaryEntry.cookingTemps.length>0;
    case 5: return diaryEntry.holdTemps&&diaryEntry.holdTemps.length>0;
    case 6: return diaryEntry.coolingRecords&&diaryEntry.coolingRecords.length>0;
    case 7: return diaryEntry.leftovers&&diaryEntry.leftovers.length>0;
    case 8: return diaryEntry.closingChecks&&Object.keys(diaryEntry.closingChecks).length>0;
    case 9: return !!(diaryEntry.signedBy);
  }
  return false;
}

function collectFormData(){
  if(!diaryEntry)return;
  const openData={};document.querySelectorAll('[data-section="open"]').forEach(el=>{openData[el.dataset.key]=el.checked;});diaryEntry.openChecks=openData;
  const closeData={};document.querySelectorAll('[data-section="close"]').forEach(el=>{closeData[el.dataset.key]=el.checked;});diaryEntry.closingChecks=closeData;
  const extraData={};document.querySelectorAll('[data-section="extra"]').forEach(el=>{extraData[el.dataset.key]=el.checked;});diaryEntry.extraChecks=extraData;
  const fridgeMap={};document.querySelectorAll('[data-cs-name]').forEach(el=>{const name=el.dataset.csName,period=el.dataset.csPeriod;if(!fridgeMap[name])fridgeMap[name]={name};fridgeMap[name][period]=el.value;});diaryEntry.fridgeTemps=Object.values(fridgeMap).filter(f=>f.am||f.pm);
  const delMap={};document.querySelectorAll('[data-del]').forEach(el=>{const i=el.dataset.del;if(!delMap[i])delMap[i]={};if(el.type==='checkbox')delMap[i][el.dataset.field]=el.checked;else delMap[i][el.dataset.field]=el.value;});diaryEntry.deliveries=Object.values(delMap).filter(d=>d.product);
  const cookArr=[];document.querySelectorAll('[data-cook]').forEach(el=>{if(el.value)cookArr.push({item:el.dataset.cook,temp:el.value});});diaryEntry.cookingTemps=cookArr;
  const holdMap={};document.querySelectorAll('[data-hold]').forEach(el=>{const item=el.dataset.hold;if(!holdMap[item])holdMap[item]={item};if(el.dataset.time)holdMap[item][el.dataset.time]=el.value;if(el.dataset.ntime)holdMap[item][el.dataset.ntime]=el.checked;});diaryEntry.holdTemps=Object.values(holdMap).filter(h=>{return HOLD_TIMES.some(t=>h['t'+t.replace(':','')]);});
  const coolMap={};document.querySelectorAll('[data-cool]').forEach(el=>{const i=el.dataset.cool;if(!coolMap[i])coolMap[i]={};if(el.type==='checkbox')coolMap[i][el.dataset.field]=el.checked;else coolMap[i][el.dataset.field]=el.value;});diaryEntry.coolingRecords=Object.values(coolMap).filter(c=>c.product);
  const leftMap={};document.querySelectorAll('[data-left]').forEach(el=>{const i=el.dataset.left;if(!leftMap[i])leftMap[i]={};if(el.tagName==='SELECT')leftMap[i][el.dataset.field]=el.value;else leftMap[i][el.dataset.field]=el.value;});diaryEntry.leftovers=Object.values(leftMap).filter(l=>l.product);
  const issEl=$('issuesText');if(issEl)diaryEntry.issues=issEl.value;
  const sigEl=$('signedByInput');if(sigEl)diaryEntry.signedBy=sigEl.value;
}
function markDirty(){_dirty=true;}

// ============================================================
//  SAVE DIARY
// ============================================================
async function saveDiary(){
  collectFormData();
  if(!diaryEntry.id)diaryEntry.id='de_'+Date.now().toString(36)+Math.random().toString(36).substr(2,4);
  diaryEntry.storeId=currentStore;
  diaryEntry.date=fmtDate(currentDate);
  diaryEntry.submittedAt=new Date().toISOString();
  const row={...diaryEntry};
  ['openChecks','fridgeTemps','deliveries','cookingTemps','coolingRecords','leftovers','closingChecks','holdTemps','extraChecks'].forEach(f=>{row[f]=row[f]?JSON.stringify(row[f]):'';});
  showToast('Saving...','success');
  const res=await apiPost({action:'upsert',sheet:'DiaryEntry',row:row});
  if(res&&!res.error){
    showToast('Saved successfully!','success');
    const idx=allEntries.findIndex(e=>e.date===row.date);
    if(idx>=0)allEntries[idx]=row;else allEntries.push(row);
    _dirty=false;renderSections();
  }else{
    showToast('Save failed: '+(res?.error||'Unknown'),'error');
  }
}

function parseEntry(raw){if(!raw)return null;const e={...raw};['openChecks','fridgeTemps','deliveries','cookingTemps','coolingRecords','leftovers','closingChecks','holdTemps','extraChecks'].forEach(f=>{if(typeof e[f]==='string'&&e[f]){try{e[f]=JSON.parse(e[f]);}catch(x){}}if(!e[f])e[f]=null;});return e;}

function renderInspMonthly(){
  const clr=STORE_COLORS[currentStore];const year=inspMonth.getFullYear(),month=inspMonth.getMonth();
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dayNames=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const daysInMonth=new Date(year,month+1,0).getDate();const todayStr=fmtDate(new Date());
  const monthPrefix=year+'-'+String(month+1).padStart(2,'0');
  const monthEntries=allEntries.filter(e=>e.date&&e.date.startsWith(monthPrefix));
  const entryDates=new Set(monthEntries.map(e=>e.date));
  let totalDays=0,filledDays=entryDates.size,missingDays=0;
  for(let d=1;d<=daysInMonth;d++){const ds=monthPrefix+'-'+String(d).padStart(2,'0');if(ds>todayStr)break;totalDays++;if(!entryDates.has(ds))missingDays++;}

    <div class="stat-card" style="background:#e3f2fd;color:#1565c0"><div class="num">${totalDays>0?Math.round(filledDays/totalDays*100):0}%</div><div class="lbl">Compliance</div></div>
  </div></div>`;
  html+=`<div style="text-align:center;margin-bottom:12px"><h3 style="color:${clr}">${STORE_NAMES[currentStore]}</h3></div><div class="insp-cal">`;
  dayNames.forEach(d=>html+=`<div class="day-header">${d}</div>`);
  let firstDay=(new Date(year,month,1).getDay()+6)%7;
  for(let i=0;i<firstDay;i++)html+='<div class="day-cell empty"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const ds=monthPrefix+'-'+String(d).padStart(2,'0');const hasEntry=entryDates.has(ds);const isFuture=ds>todayStr;const isToday=ds===todayStr;
    let cls='day-cell';if(isToday)cls+=' today';if(!isFuture){cls+=hasEntry?' has-entry':' no-entry';}if(isFuture)cls+=' empty';
    html+=`<div class="${cls}" ${!isFuture?`onclick="inspViewDay('${ds}')"`:''}><span>${d}</span>${!isFuture?'<div class="dot-indicator"></div>':''}</div>`;
  }
  html+='</div>';
  html+=`<div style="margin-top:16px"><h4 style="margin-bottom:10px;font-size:14px;color:var(--text-light)">Daily Records</h4>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=monthPrefix+'-'+String(d).padStart(2,'0');if(ds>todayStr)break;
    const entry=getEntryForDate(ds);const dayDate=new Date(year,month,d);const dayLabel=niceDate(dayDate);
    if(entry){
      html+=`<div style="padding:12px;margin-bottom:6px;background:#f8f9fa;border-radius:10px;border-left:4px solid var(--success);cursor:pointer;display:flex;align-items:center;gap:10px" onclick="inspViewDay('${ds}')"><i class="fas fa-check-circle" style="color:var(--success)"></i><div style="flex:1"><strong style="font-size:13px">${dayLabel}</strong></div><div style="font-size:11px;color:var(--text-light)">${entry.signedBy||'—'}</div><i class="fas fa-chevron-right" style="color:#ccc;font-size:12px"></i></div>`;
    }else{
      html+=`<div style="padding:12px;margin-bottom:6px;background:#fff8e1;border-radius:10px;border-left:4px solid var(--warning);display:flex;align-items:center;gap:10px"><i class="fas fa-exclamation-circle" style="color:var(--warning)"></i><div style="flex:1"><strong style="font-size:13px">${dayLabel}</strong></div><div style="font-size:11px;color:var(--warning);font-weight:600">Missing</div></div>`;
    }
  }
  html+='</div>';
  $('inspectorContent').innerHTML=html;
}
function inspChangeMonth(delta){inspMonth.setMonth(inspMonth.getMonth()+delta);renderInspMonthly();}
function inspViewDay(ds){const parts=ds.split('-');inspDate=new Date(+parts[0],+parts[1]-1,+parts[2]);switchInspTab('daily');}

// ============================================================
//  RENDER INSPECTOR ENTRY
// ============================================================
function renderInspEntry(e,clr){
  let html='';
  html+=inspSection('Opening Checks',clr,()=>{let t='<table class="insp-table"><tr><th>Check</th><th style="width:60px;text-align:center">Status</th></tr>';OPENING_CHECKS.forEach(c=>{const v=e.openChecks&&e.openChecks[c.key];t+=`<tr><td>${c.label}</td><td style="text-align:center" class="${v?'yes':'no'}">${v?'YES':'NO'}</td></tr>`;});return t+'</table>';});
  html+=inspSection('Cold Storage',clr,()=>{if(!e.fridgeTemps||e.fridgeTemps.length===0)return '<div style="color:var(--text-light)">No data recorded</div>';let t='<table class="insp-table"><tr><th>Name</th><th style="text-align:center">AM °C</th><th style="text-align:center">PM °C</th></tr>';(e.fridgeTemps||[]).forEach(f=>{t+=`<tr><td>${f.name}</td><td style="text-align:center">${f.am||'—'}</td><td style="text-align:center">${f.pm||'—'}</td></tr>`;});return t+'</table>';});
  html+=inspSection('Delivery',clr,()=>{if(!e.deliveries||e.deliveries.length===0)return '<div style="color:var(--text-light)">No deliveries</div>';let t='<table class="insp-table"><tr><th>Product/Company</th><th>Visual</th><th>Temp</th><th>Accepted</th></tr>';(e.deliveries||[]).forEach(d=>{t+=`<tr><td>${d.product||'—'}</td><td class="${d.visualOk?'yes':'no'}">${d.visualOk?'Y':'N'}</td><td class="${d.tempOk?'yes':'no'}">${d.tempOk?'Y':'N'}</td><td class="${d.accepted?'yes':'no'}">${d.accepted?'Y':'N'}</td></tr>`;});return t+'</table>';});
  html+=inspSection('Cooking Temperature',clr,()=>{if(!e.cookingTemps||e.cookingTemps.length===0)return '<div style="color:var(--text-light)">No data</div>';let t='<table class="insp-table"><tr><th>Item</th><th style="text-align:center">Temp °C</th></tr>';(e.cookingTemps||[]).forEach(c=>{t+=`<tr><td>${c.item}</td><td style="text-align:center;font-weight:700">${c.temp||'—'}</td></tr>`;});return t+'</table>';});
  html+=inspSection('Food Hold Temperature',clr,()=>{if(!e.holdTemps||e.holdTemps.length===0)return '<div style="color:var(--text-light)">No data</div>';let t='<table class="insp-table"><tr><th>Item</th>';HOLD_TIMES.forEach(tm=>t+=`<th style="text-align:center">${tm}</th>`);t+='</tr>';(e.holdTemps||[]).forEach(h=>{t+=`<tr><td>${h.item}</td>`;HOLD_TIMES.forEach(tm=>{const k='t'+tm.replace(':','');const nk='n'+tm.replace(':','');const v=h[k]||'—';const isN=h[nk];t+=`<td style="text-align:center;font-weight:700${isN?';color:var(--warning)':''}">${v}${isN?' (N)':''}</td>`;});t+='</tr>';});return t+'</table>';});
  html+=inspSection('Cooling',clr,()=>{if(!e.coolingRecords||e.coolingRecords.length===0)return '<div style="color:var(--text-light)">No data</div>';let t='<table class="insp-table"><tr><th>Product</th><th>Time (min)</th><th>OK</th></tr>';(e.coolingRecords||[]).forEach(c=>{t+=`<tr><td>${c.product}</td><td>${c.timeTaken||'—'}</td><td class="${c.ok?'yes':'no'}">${c.ok?'Y':'N'}</td></tr>`;});return t+'</table>';});
  html+=inspSection('Leftovers',clr,()=>{if(!e.leftovers||e.leftovers.length===0)return '<div style="color:var(--text-light)">No data</div>';let t='<table class="insp-table"><tr><th>Product</th><th>Action</th></tr>';(e.leftovers||[]).forEach(l=>{t+=`<tr><td>${l.product}</td><td>${l.action==='discard'?'Discarded':'Stored'}</td></tr>`;});return t+'</table>';});
  html+=inspSection('Closing Checks',clr,()=>{let t='<table class="insp-table"><tr><th>Check</th><th style="width:60px;text-align:center">Status</th></tr>';CLOSING_CHECKS.forEach(c=>{const v=e.closingChecks&&e.closingChecks[c.key];t+=`<tr><td>${c.label}</td><td style="text-align:center" class="${v?'yes':'no'}">${v?'YES':'NO'}</td></tr>`;});return t+'</table>';});
  html+=inspSection('Extra Checks',clr,()=>{let t='<table class="insp-table"><tr><th>Check</th><th style="width:60px;text-align:center">Done</th></tr>';EXTRA_CHECKS.forEach(c=>{const v=e.extraChecks&&e.extraChecks[c.key];t+=`<tr><td>${c.label}</td><td style="text-align:center" class="${v?'yes':'no'}">${v?'YES':'NO'}</td></tr>`;});return t+'</table>';});
  html+=inspSection('Issues & Remedial Action',clr,()=>`<div style="padding:8px;min-height:40px;white-space:pre-wrap">${e.issues||'None recorded'}</div>`);
  html+=`<div style="margin-top:20px;padding:14px;background:#f8f9fa;border-radius:10px;display:flex;align-items:center;gap:12px"><i class="fas fa-signature" style="font-size:20px;color:${clr}"></i><div><strong>Signed by:</strong> ${e.signedBy||'—'}</div></div>`;
  return html;
}
function inspSection(title,clr,contentFn){return `<div class="insp-section"><h4 style="background:${clr}">${title}</h4>${contentFn()}</div>`;}

// ============================================================
//  PRINT
// ============================================================
function printInspEntry(){
  const ds=inspDate.toISOString().slice(0,10);
  const raw=allEntries.find(x=>x.storeId===currentStore&&x.date===ds);
  if(!raw){showToast('No entry to print','error');return;}
  const e=parseEntry(raw);const clr=STORE_COLORS[currentStore]||'#333';const storeName=STORE_NAMES[currentStore]||currentStore;
  const w=window.open('','_blank');
  let h=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Diary — ${storeName} — ${ds}</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,Helvetica,sans-serif;font-size:9px;color:#222;padding:8mm 10mm}@page{size:A4 portrait;margin:8mm 10mm}@media print{button{display:none!important}}h3{font-size:11px;margin:4px 0 2px;padding:3px 6px;color:#fff;border-radius:3px;display:inline-block}table{width:100%;border-collapse:collapse;margin-bottom:4px}th,td{border:1px solid #ccc;padding:2px 4px;text-align:left;font-size:8.5px}th{background:#f0f0f0;font-weight:700;font-size:8px}.hdr{display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid ${clr};padding-bottom:4px;margin-bottom:6px}.hdr .store{font-size:18px;font-weight:800;color:${clr}}.hdr .date{font-size:12px;font-weight:700}.yes{color:#27ae60;font-weight:700}.no{color:#e74c3c;font-weight:700}.sec{margin-bottom:5px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1px 12px;font-size:8.5px}.grid2 .row{display:flex;justify-content:space-between;padding:1px 0;border-bottom:1px solid #eee}.sig{margin-top:6px;padding:4px 8px;background:#f5f5f5;border-radius:3px;font-size:9px}</style></head><body>`;
  h+=`<div class="hdr"><div><div class="store">${storeName}</div><div style="font-size:10px;color:#666">Daily Shop Diary</div></div><div class="date">${ds}</div></div>`;
  h+=`<div class="sec"><h3 style="background:#1b5e20">Opening Checks</h3><div class="grid2">`;OPENING_CHECKS.forEach(c=>{const v=e.openChecks&&e.openChecks[c.key];h+=`<div class="row"><span>${c.label}</span><span class="${v?'yes':'no'}">${v?'YES':'NO'}</span></div>`;});h+=`</div></div>`;
  const ft=e.fridgeTemps||[];if(ft.length>0){h+=`<div class="sec"><h3 style="background:#1565c0">Cold Storage</h3><table><tr><th>Name</th><th style="text-align:center;width:60px">AM °C</th><th style="text-align:center;width:60px">PM °C</th></tr>`;ft.forEach(f=>{h+=`<tr><td>${f.name}</td><td style="text-align:center;font-weight:700">${f.am||'—'}</td><td style="text-align:center;font-weight:700">${f.pm||'—'}</td></tr>`;});h+=`</table></div>`;}
  const dl=e.deliveries||[];if(dl.length>0){h+=`<div class="sec"><h3 style="background:#6a1b9a">Deliveries</h3><table><tr><th>Product</th><th style="text-align:center;width:50px">Visual</th><th style="text-align:center;width:50px">Temp</th><th style="text-align:center;width:50px">Accepted</th></tr>`;dl.forEach(d=>{h+=`<tr><td>${d.product||'—'}</td><td style="text-align:center" class="${d.visualOk?'yes':'no'}">${d.visualOk?'Y':'N'}</td><td style="text-align:center" class="${d.tempOk?'yes':'no'}">${d.tempOk?'Y':'N'}</td><td style="text-align:center" class="${d.accepted?'yes':'no'}">${d.accepted?'Y':'N'}</td></tr>`;});h+=`</table></div>`;}
  const ct=e.cookingTemps||[];if(ct.length>0){h+=`<div class="sec"><h3 style="background:#e65100">Cooking Temps</h3><table><tr><th>Item</th><th style="text-align:center;width:60px">Temp °C</th></tr>`;ct.forEach(c=>{h+=`<tr><td>${c.item}</td><td style="text-align:center;font-weight:700">${c.temp||'—'}</td></tr>`;});h+=`</table></div>`;}
  const ht=e.holdTemps||[];if(ht.length>0){h+=`<div class="sec"><h3 style="background:#c62828">Food Hold Temps</h3><table><tr><th>Item</th>`;HOLD_TIMES.forEach(t=>h+=`<th style="text-align:center;width:50px">${t}</th>`);h+='</tr>';ht.forEach(hi=>{h+=`<tr><td>${hi.item}</td>`;HOLD_TIMES.forEach(t=>{const k='t'+t.replace(':','');const nk='n'+t.replace(':','');const v=hi[k]||'—';const isN=hi[nk];h+=`<td style="text-align:center;font-weight:700;${isN?'color:#1565c0;font-style:italic':''}">${v}${(hi[nk]&&v!=='N')?' (N)':''}</td>`;});h+='</tr>';});h+=`</table></div>`;}
  const cl=e.coolingRecords||[];if(cl.length>0){h+=`<div class="sec"><h3 style="background:#00695c">Cooling</h3><table><tr><th>Product</th><th style="text-align:center;width:60px">Time(min)</th><th style="text-align:center;width:50px">OK</th></tr>`;cl.forEach(c=>{h+=`<tr><td>${c.product}</td><td style="text-align:center">${c.timeTaken||'—'}</td><td style="text-align:center" class="${c.ok?'yes':'no'}">${c.ok?'Y':'N'}</td></tr>`;});h+=`</table></div>`;}
  const lo=e.leftovers||[];if(lo.length>0){h+=`<div class="sec"><h3 style="background:#4e342e">Leftovers</h3><table><tr><th>Product</th><th style="text-align:center;width:80px">Action</th></tr>`;lo.forEach(l=>{h+=`<tr><td>${l.product}</td><td style="text-align:center">${l.action==='discard'?'Discarded':'Stored'}</td></tr>`;});h+=`</table></div>`;}
  h+=`<div class="sec"><h3 style="background:#b71c1c">Closing Checks</h3><div class="grid2">`;CLOSING_CHECKS.forEach(c=>{const v=e.closingChecks&&e.closingChecks[c.key];h+=`<div class="row"><span>${c.label}</span><span class="${v?'yes':'no'}">${v?'YES':'NO'}</span></div>`;});h+=`</div></div>`;
  h+=`<div class="sec"><h3 style="background:#37474f">Extra Checks</h3><div class="grid2">`;EXTRA_CHECKS.forEach(c=>{const v=e.extraChecks&&e.extraChecks[c.key];h+=`<div class="row"><span>${c.label}</span><span class="${v?'yes':'no'}">${v?'YES':'NO'}</span></div>`;});h+=`</div></div>`;
  h+=`<div class="sec"><h3 style="background:#f39c12">Issues & Remedial Action</h3><div style="padding:3px 6px;background:#fafafa;border:1px solid #eee;border-radius:3px;min-height:20px;white-space:pre-wrap;font-size:8.5px">${e.issues||'None'}</div></div>`;
  h+=`<div class="sig"><strong>Signed by:</strong> ${e.signedBy||'—'}</div>`;
  h+=`<div style="text-align:center;margin-top:12px"><button onclick="window.print()" style="padding:10px 30px;font-size:14px;font-weight:700;background:#222;color:#fff;border:none;border-radius:8px;cursor:pointer">Print</button></div>`;
  h+=`</body></html>`;w.document.write(h);w.document.close();
}

// ============================================================
//  TOAST
// ============================================================
function showToast(msg,type){const t=$('toast');t.textContent=msg;t.className='toast '+type+' show';clearTimeout(t._timer);t._timer=setTimeout(()=>t.classList.remove('show'),2500);}

// ============================================================
//  FULLSCREEN MODE
// ============================================================
function goFullscreen(){
  const el=document.documentElement;
  if(el.requestFullscreen)el.requestFullscreen();
  else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
  else if(el.msRequestFullscreen)el.msRequestFullscreen();
  const ov=document.getElementById('fsOverlay');if(ov)ov.remove();
  const ov2=document.getElementById('fsReturnOverlay');if(ov2)ov2.remove();
}
let _skipFsOverlay=false;
function exitFsHandler(){
  if(_skipFsOverlay)return;
  if(!document.fullscreenElement&&!document.webkitFullscreenElement){
    if(!document.getElementById('fsOverlay')&&!document.getElementById('fsReturnOverlay'))showFsOverlay();
  }
}
function showFsOverlay(){
  const ov=document.createElement('div');ov.className='fs-overlay';ov.id='fsOverlay';
  ov.innerHTML='<div class="fs-icon"><i class="fas fa-expand"></i></div><h2>Tap to Start</h2><p>Full screen kiosk mode</p>';
  ov.addEventListener('click',goFullscreen);
  document.body.appendChild(ov);
}
function showFsReturnOverlay(){
  if(document.fullscreenElement||document.webkitFullscreenElement)return;
  if(document.getElementById('fsReturnOverlay'))return;
  const ov=document.createElement('div');ov.className='fs-overlay';ov.id='fsReturnOverlay';
  ov.style.background='rgba(0,0,0,.7)';
  ov.innerHTML='<div class="fs-icon"><i class="fas fa-expand"></i></div><h2>Tap to Continue</h2><p>Return to full screen</p>';
  ov.addEventListener('click',function(){goFullscreen();});
  document.body.appendChild(ov);
}
document.addEventListener('fullscreenchange',exitFsHandler);
document.addEventListener('webkitfullscreenchange',exitFsHandler);
if(!window.matchMedia('(display-mode: standalone)').matches&&!window.matchMedia('(display-mode: fullscreen)').matches){
  showFsOverlay();
}
</script>
