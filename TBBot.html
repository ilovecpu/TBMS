<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>The Bap AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg:#0f0f0f; --surface:#1a1a1a; --surface2:#242424; --surface3:#2e2e2e;
  --text:#e8e8e8; --text-light:#999; --text-dim:#666;
  --accent:#e67e22; --accent-light:#f39c12; --accent-dark:#d35400;
  --success:#27ae60; --danger:#e74c3c; --info:#3498db;
  --bot-bg:#1e2a1e; --user-bg:#1a2436;
  --radius:12px; --radius-sm:8px;
  --shadow:0 2px 8px rgba(0,0,0,.3);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* ─── Header ─── */
.header{background:var(--surface);padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--surface3);flex-shrink:0}
.header-logo{width:36px;height:36px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff}
.header-info{flex:1}
.header-title{font-size:15px;font-weight:600}
.header-mode{font-size:11px;color:var(--accent);font-weight:500}
.header-btn{background:none;border:none;color:var(--text-light);font-size:18px;cursor:pointer;padding:6px}
.header-btn:hover{color:var(--accent)}

/* ─── PIN Modal ─── */
.pin-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:1000}
.pin-box{background:var(--surface);padding:32px 24px;border-radius:var(--radius);text-align:center;width:90%;max-width:320px}
.pin-box h3{margin-bottom:16px;font-size:18px}
.pin-box input{width:100%;padding:12px;font-size:20px;text-align:center;letter-spacing:8px;background:var(--surface2);border:1px solid var(--surface3);border-radius:var(--radius-sm);color:var(--text);outline:none}
.pin-box input:focus{border-color:var(--accent)}
.pin-box .pin-err{color:var(--danger);font-size:12px;margin-top:8px;min-height:16px}
.pin-box button{margin-top:16px;width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer}

/* ─── Chat Area ─── */
.chat-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.msg{max-width:85%;padding:12px 16px;border-radius:var(--radius);font-size:14px;line-height:1.6;word-wrap:break-word;animation:fadeIn .2s ease}
.msg-bot{background:var(--bot-bg);align-self:flex-start;border-bottom-left-radius:4px}
.msg-user{background:var(--user-bg);align-self:flex-end;border-bottom-right-radius:4px}
.msg-system{background:var(--surface2);align-self:center;text-align:center;font-size:12px;color:var(--text-light);padding:8px 16px;border-radius:20px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Typing indicator */
.typing{display:flex;gap:4px;padding:12px 16px;align-self:flex-start}
.typing span{width:8px;height:8px;background:var(--text-dim);border-radius:50%;animation:bounce .6s infinite alternate}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{to{transform:translateY(-6px);background:var(--accent)}}

/* KB Preview Card (Training Mode) */
.kb-preview{background:var(--surface2);border:1px solid var(--surface3);border-radius:var(--radius-sm);padding:12px;margin-top:8px}
.kb-preview .kb-cat{font-size:11px;color:var(--accent);font-weight:600;text-transform:uppercase;margin-bottom:4px}
.kb-preview .kb-title{font-size:14px;font-weight:600;margin-bottom:6px}
.kb-preview .kb-content{font-size:13px;color:var(--text-light);white-space:pre-wrap;margin-bottom:8px;max-height:200px;overflow-y:auto}
.kb-preview .kb-tags{font-size:11px;color:var(--info)}
.kb-preview .kb-actions{display:flex;gap:8px;margin-top:10px}
.kb-preview .kb-actions button{flex:1;padding:8px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer}
.kb-preview .kb-save{background:var(--success);color:#fff}
.kb-preview .kb-edit{background:var(--surface3);color:var(--text)}
.kb-preview .kb-discard{background:var(--danger);color:#fff}

/* ─── Input Area ─── */
.input-area{background:var(--surface);padding:12px 16px;border-top:1px solid var(--surface3);flex-shrink:0}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-row textarea{flex:1;background:var(--surface2);border:1px solid var(--surface3);border-radius:var(--radius-sm);padding:10px 14px;font-size:14px;color:var(--text);resize:none;max-height:120px;outline:none;font-family:inherit;line-height:1.5}
.input-row textarea:focus{border-color:var(--accent)}
.input-row button{width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.btn-send{background:var(--accent);color:#fff}
.btn-send:disabled{opacity:.4;cursor:default}
.btn-attach{background:var(--surface3);color:var(--text-light)}
.btn-attach:hover{color:var(--accent)}
.input-controls{display:flex;align-items:center;gap:12px;margin-top:8px}
.training-toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-light);cursor:pointer}
.training-toggle input{display:none}
.training-toggle .toggle-track{width:36px;height:20px;background:var(--surface3);border-radius:10px;position:relative;transition:.2s}
.training-toggle input:checked+.toggle-track{background:var(--success)}
.training-toggle .toggle-thumb{width:16px;height:16px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:.2s}
.training-toggle input:checked+.toggle-track .toggle-thumb{left:18px}
.provider-select{font-size:11px;color:var(--text-dim);margin-left:auto}
.provider-select select{background:var(--surface2);color:var(--text-light);border:1px solid var(--surface3);border-radius:4px;padding:2px 6px;font-size:11px}

/* ─── Settings Panel ─── */
.settings-panel{position:fixed;top:0;right:-100%;width:100%;max-width:360px;height:100%;background:var(--surface);z-index:500;transition:right .3s;overflow-y:auto;padding:20px}
.settings-panel.open{right:0}
.settings-panel h3{font-size:16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.settings-panel label{font-size:12px;color:var(--text-light);display:block;margin:12px 0 4px}
.settings-panel input,.settings-panel select{width:100%;padding:10px;background:var(--surface2);border:1px solid var(--surface3);border-radius:var(--radius-sm);color:var(--text);font-size:14px}
.settings-panel .btn-save{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;margin-top:20px}

/* ─── File upload overlay ─── */
.file-preview-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:600;padding:20px}
.file-preview-box{background:var(--surface);border-radius:var(--radius);width:100%;max-width:500px;max-height:80vh;overflow-y:auto;padding:24px}
.file-preview-box h3{margin-bottom:12px}
.file-preview-box .file-name{font-size:13px;color:var(--text-light);margin-bottom:16px}
.file-preview-box textarea{width:100%;min-height:200px;background:var(--surface2);border:1px solid var(--surface3);border-radius:var(--radius-sm);color:var(--text);padding:12px;font-size:13px;resize:vertical}
.file-preview-box .fp-btns{display:flex;gap:8px;margin-top:16px}
.file-preview-box .fp-btns button{flex:1;padding:10px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer}

/* ─── Responsive ─── */
@media(max-width:480px){
  .msg{max-width:92%}
}
/* Markdown-like */
.msg-bot b,.msg-bot strong{color:var(--accent-light)}
.msg-bot code{background:var(--surface3);padding:2px 6px;border-radius:4px;font-size:12px}
.msg-bot pre{background:var(--surface3);padding:10px;border-radius:6px;overflow-x:auto;margin:8px 0;font-size:12px}
.msg-bot ul,.msg-bot ol{margin:6px 0 6px 20px}
.msg-bot li{margin:3px 0}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-logo">TB</div>
  <div class="header-info">
    <div class="header-title"><span id="hdrTitle">The Bap Staff AI</span> <span style="font-size:11px;font-weight:400;opacity:.45">Ver2.4</span></div>
    <div class="header-mode" id="hdrMode">Staff Mode</div>
  </div>
  <button class="header-btn" onclick="toggleSettings()" title="Settings"><i class="fas fa-cog"></i></button>
</div>

<!-- PIN Modal (hidden by default) -->
<div class="pin-overlay" id="pinModal" style="display:none">
  <div class="pin-box">
    <h3><i class="fas fa-lock" style="color:var(--accent);margin-right:8px"></i>Manager Access</h3>
    <p style="font-size:13px;color:var(--text-light);margin-bottom:16px">Enter PIN to access The Bap AI Bot</p>
    <input type="password" id="pinInput" maxlength="6" placeholder="••••" onkeydown="if(event.key==='Enter')verifyPin()">
    <div class="pin-err" id="pinErr"></div>
    <button onclick="verifyPin()">Unlock</button>
    <p style="font-size:11px;color:var(--text-dim);margin-top:12px;cursor:pointer" onclick="fallbackStaff()">Continue as Staff →</p>
  </div>
</div>

<!-- Chat Area -->
<div class="chat-area" id="chatArea">
  <div class="msg msg-system">Welcome! Ask me anything about The Bap.</div>
</div>

<!-- Input Area -->
<div class="input-area">
  <div class="input-row">
    <button class="btn-attach" id="btnAttach" style="display:none" onclick="document.getElementById('fileInput').click()" title="Upload file">
      <i class="fas fa-paperclip"></i>
    </button>
    <input type="file" id="fileInput" style="display:none" accept=".xlsx,.xls,.csv,.txt,.pdf,.json" onchange="handleFileUpload(event)">
    <textarea id="msgInput" rows="1" placeholder="Ask me anything..." onkeydown="handleInputKey(event)" oninput="autoResize(this)"></textarea>
    <button class="btn-send" id="btnSend" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
  </div>
  <div class="input-controls">
    <label class="training-toggle" id="trainingToggle" style="display:none">
      <input type="checkbox" id="trainingMode" onchange="toggleTrainingMode()">
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
      <span>Training</span>
    </label>
    <div class="provider-select">
      <select id="aiProvider" onchange="saveLocalSetting('botProvider',this.value)">
        <option value="chatgpt">ChatGPT</option>
        <option value="gemini">Gemini</option>
        <option value="claude">Claude</option>
      </select>
    </div>
  </div>
</div>

<!-- Settings Panel -->
<div class="settings-panel" id="settingsPanel">
  <h3>Bot Settings <button class="header-btn" onclick="toggleSettings()"><i class="fas fa-times"></i></button></h3>
  <label>AI Provider</label>
  <select id="setProvider" onchange="document.getElementById('aiProvider').value=this.value">
    <option value="chatgpt">ChatGPT (GPT-4o)</option>
    <option value="gemini">Gemini 2.0 Flash</option>
    <option value="claude">Claude Sonnet</option>
  </select>
  <label>API Key</label>
  <input type="password" id="setApiKey" placeholder="Enter your API key">
  <label>Model Override (optional)</label>
  <input type="text" id="setModel" placeholder="e.g. gpt-4o-mini">
  <button class="btn-save" onclick="saveSettings()">Save Settings</button>
  <p style="font-size:11px;color:var(--text-dim);margin-top:16px;text-align:center">The Bap AI Brain Ver2.4</p>
</div>

<!-- File Preview Overlay -->
<div class="file-preview-overlay" id="fileOverlay" style="display:none">
  <div class="file-preview-box">
    <h3><i class="fas fa-file-alt" style="color:var(--accent);margin-right:8px"></i>File Content</h3>
    <div class="file-name" id="fileName"></div>
    <textarea id="fileContent" placeholder="File content will appear here..."></textarea>
    <div class="fp-btns">
      <button style="background:var(--surface3);color:var(--text)" onclick="closeFilePreview()">Cancel</button>
      <button style="background:var(--accent);color:#fff" onclick="processFileContent()">Send to AI</button>
    </div>
  </div>
</div>

<script>
// ============================================================
//  The Bap AI Bot — Ver2.4
// ============================================================
const API_URL = 'https://script.google.com/macros/s/AKfycbzIOUKhRoUysB6FGK-TTbkdguXYFy_GZF0qHS6XadqUs8eKQVL_m3J3zrFjHczfcHtO/exec';
const API_KEY = 'tBaP2026xKr!mGt9Qz';

const KB_CATEGORIES = [
  'Brand Philosophy','Menu & Recipes','Sauce Recipes','Supplier Info',
  'Staff Training','Kitchen Ops','Store Ops','Marketing','Expansion','Memory'
];

const STAFF_CATEGORIES = [
  'Brand Philosophy','Menu & Recipes','Sauce Recipes','Staff Training','Kitchen Ops','Store Ops'
];

// State
let MODE = 'staff'; // 'staff' or 'manager'
let isTraining = false;
let chatHistory = [];
let kbData = [];
let tbmsData = { Stores:[], Staff:[], Suppliers:[], StoreInfo:[], WeeklySales:[], StockTemplate:[], StoreStock:[], DiaryConfig:[], DiaryEntry:[], StaffMessages:[], Attendance:[] };
let isSending = false;
let pendingKBEntries = [];

// ============================================================
//  Init
// ============================================================
window.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(window.location.search);
  const mode = params.get('mode');

  // Load saved settings
  loadLocalSettings();

  if (mode === 'manager') {
    const pin = params.get('pin');
    const savedPin = localStorage.getItem('tbap_mgr_pin');
    if (pin && savedPin && pin === savedPin) {
      activateManager();
    } else {
      document.getElementById('pinModal').style.display = 'flex';
    }
  } else {
    activateStaff();
  }

  // Load KB + TBMS data
  await Promise.all([loadKB(), loadTBMSData()]);
  // Update badge with final counts (KB might have loaded after TBMS)
  const totalTables = Object.values(tbmsData).filter(arr => arr.length > 0).length;
  const kbCount = kbData.length;
  if (totalTables > 0 || kbCount > 0) {
    updateStatusBadge(`✓ ${totalTables} tables, ${kbCount} KB loaded`, 'ok');
  }
});

function activateStaff() {
  MODE = 'staff';
  document.getElementById('hdrTitle').textContent = 'The Bap Staff AI';
  document.getElementById('hdrMode').textContent = 'Staff Mode';
  document.getElementById('trainingToggle').style.display = 'none';
  document.getElementById('btnAttach').style.display = 'none';
  document.getElementById('pinModal').style.display = 'none';
  addBotMessage("안녕하세요! The Bap Staff AI입니다. 레시피, 조리법, 매장 운영 절차 등 무엇이든 물어보세요.\n\nHello! I'm The Bap Staff AI. Ask me about recipes, cooking methods, or store procedures.");
}

function activateManager() {
  MODE = 'manager';
  document.getElementById('hdrTitle').textContent = 'The Bap AI Bot';
  document.getElementById('hdrMode').textContent = 'Manager Mode';
  document.getElementById('trainingToggle').style.display = 'flex';
  document.getElementById('btnAttach').style.display = 'flex';
  document.getElementById('pinModal').style.display = 'none';
  addBotMessage("The Bap AI Bot 활성화. 운영, 마케팅, 전략 등 무엇이든 물어보세요.\nTraining Mode를 켜면 새로운 지식을 가르칠 수 있습니다.\n\nThe Bap AI Bot activated. Ask about operations, marketing, strategy, or anything.\nTurn on Training Mode to teach me new knowledge.");
  // Reload full data for manager (includes all sheets)
  loadTBMSData();
}

function verifyPin() {
  const pin = document.getElementById('pinInput').value;
  const savedPin = localStorage.getItem('tbap_mgr_pin');
  if (!savedPin) {
    // No PIN set yet → accept first PIN as setup
    if (pin.length >= 4) {
      localStorage.setItem('tbap_mgr_pin', pin);
      activateManager();
    } else {
      document.getElementById('pinErr').textContent = 'PIN must be at least 4 digits';
    }
    return;
  }
  if (pin === savedPin) {
    activateManager();
  } else {
    document.getElementById('pinErr').textContent = 'Incorrect PIN';
    document.getElementById('pinInput').value = '';
  }
}

function fallbackStaff() {
  document.getElementById('pinModal').style.display = 'none';
  activateStaff();
}

// ============================================================
//  Knowledge Base
// ============================================================
async function loadKB() {
  try {
    const res = await fetch(`${API_URL}?action=getKB&apikey=${encodeURIComponent(API_KEY)}`, {redirect:'follow'});
    const json = await res.json();
    if (json.status === 'ok') {
      kbData = (json.data || []).filter(kb => kb.active !== false && kb.active !== 'false');
      console.log('KB loaded:', kbData.length, 'active entries');
    } else {
      console.warn('KB load failed:', json);
    }
  } catch(e) {
    console.warn('KB load error:', e);
  }
}

async function loadTBMSData() {
  // Staff mode: basic info only. Manager mode: everything
  const baseSheets = ['Stores', 'Staff', 'Suppliers', 'StoreInfo'];
  const mgrSheets = ['WeeklySales', 'StockTemplate', 'StoreStock', 'DiaryConfig', 'DiaryEntry', 'StaffMessages', 'Attendance'];
  const sheets = MODE === 'manager' ? [...baseSheets, ...mgrSheets] : baseSheets;
  const results = [];
  updateStatusBadge('Loading data...', 'info');

  // Fetch sheets in parallel (batch of 3 to avoid throttling)
  for (let i = 0; i < sheets.length; i += 3) {
    const batch = sheets.slice(i, i + 3);
    await Promise.all(batch.map(async (sheet) => {
      try {
        const url = `${API_URL}?action=getSheet&sheet=${sheet}&apikey=${encodeURIComponent(API_KEY)}`;
        const res = await fetch(url, {redirect:'follow'});
        const text = await res.text();
        let json;
        try { json = JSON.parse(text); } catch(pe) {
          console.error(`${sheet} parse error:`, text.substring(0, 200));
          return;
        }
        if (json.status === 'ok' && json.data) {
          tbmsData[sheet] = json.data;
          results.push(`${sheet}:${json.data.length}`);
        } else {
          console.warn(`${sheet} response:`, json.error || 'no data');
        }
      } catch(e) {
        console.error(`${sheet} fetch error:`, e.message);
      }
    }));
  }

  const total = Object.values(tbmsData).reduce((n, arr) => n + arr.length, 0);
  const kbCount = kbData.length;
  if (total > 0 || kbCount > 0) {
    console.log('TBMS data loaded:', results.join(', '), '| KB entries:', kbCount);
    updateStatusBadge(`✓ ${results.length} tables, ${kbCount} KB loaded`, 'ok');
  } else {
    console.warn('TBMS data: 0 records loaded, KB: 0');
    updateStatusBadge('⚠ No data loaded', 'warn');
  }
}

function updateStatusBadge(text, type) {
  let badge = document.getElementById('dataBadge');
  if (!badge) {
    badge = document.createElement('div');
    badge.id = 'dataBadge';
    badge.style.cssText = 'position:fixed;top:60px;right:8px;font-size:10px;padding:2px 8px;border-radius:10px;z-index:100;opacity:.8';
    document.body.appendChild(badge);
  }
  badge.textContent = text;
  badge.style.background = type === 'ok' ? 'var(--success)' : type === 'info' ? 'var(--info)' : 'var(--danger)';
  badge.style.color = '#fff';
  setTimeout(() => { if (badge) badge.style.opacity = '0.4'; }, 5000);
}

// Korean↔English synonym map for better search matching
const KB_SYNONYMS = {
  '비전': ['vision','philosophy','철학','미션','mission'],
  'vision': ['비전','철학','philosophy','미션','mission'],
  '철학': ['philosophy','비전','vision','미션','mission'],
  'philosophy': ['철학','비전','vision','mission','미션'],
  '컨셉': ['concept','컨셉트','개념'],
  'concept': ['컨셉','컨셉트','개념'],
  '레시피': ['recipe','조리법','요리법','만드는법'],
  'recipe': ['레시피','조리법','요리법'],
  '소스': ['sauce','양념','드레싱'],
  'sauce': ['소스','양념','드레싱'],
  '메뉴': ['menu','음식','요리','food'],
  'menu': ['메뉴','음식','요리'],
  '교육': ['training','트레이닝','매뉴얼','manual'],
  'training': ['교육','트레이닝','매뉴얼'],
  '위생': ['hygiene','청소','cleaning','sanitation'],
  'hygiene': ['위생','청소','cleaning'],
  '운영': ['operations','ops','관리','management'],
  '마케팅': ['marketing','홍보','브랜딩','branding'],
  'marketing': ['마케팅','홍보','브랜딩'],
  '확장': ['expansion','신규','새매장','new store'],
  'expansion': ['확장','신규','새매장'],
  '공급': ['supplier','업체','발주','supply'],
  'supplier': ['공급','업체','발주'],
  '브랜드': ['brand','the bap','더밥'],
  'brand': ['브랜드','the bap','더밥'],
  '회사': ['company','brand','브랜드','the bap'],
  'company': ['회사','브랜드','brand'],
  '매장': ['store','shop','가게','지점'],
  'store': ['매장','shop','가게','지점'],
  '직원': ['staff','employee','팀원'],
  'staff': ['직원','employee','팀원']
};

function expandQueryWords(words) {
  const expanded = new Set(words);
  words.forEach(w => {
    const syns = KB_SYNONYMS[w];
    if (syns) syns.forEach(s => expanded.add(s.toLowerCase()));
  });
  return [...expanded];
}

function getRelevantKB(query, isDJCommand) {
  if (!kbData.length) return [];

  const categories = MODE === 'staff' ? STAFF_CATEGORIES : KB_CATEGORIES;
  // Access hierarchy: customer < staff < manager < dj (higher levels see all lower)
  const allowedAccess = isDJCommand ? ['customer','staff','manager','dj'] :
                        MODE === 'manager' ? ['customer','staff','manager'] : ['customer','staff'];

  // Filter allowed entries
  const allowed = kbData.filter(kb =>
    kb.active !== false && kb.active !== 'false' &&
    categories.includes(kb.category) &&
    allowedAccess.includes(kb.accessLevel || 'staff')
  );

  // If small KB (≤20 entries), pass ALL to AI — AI is better at semantic matching
  if (allowed.length <= 20) {
    return allowed;
  }

  // For larger KB, use improved keyword matching with synonym expansion
  const q = query.toLowerCase();
  const baseWords = q.split(/\s+/).filter(w => w.length > 1);
  const words = expandQueryWords(baseWords);

  const scored = allowed
    .map(kb => {
      let score = 0;
      const text = `${kb.title} ${kb.content} ${kb.tags} ${kb.category}`.toLowerCase();
      words.forEach(w => {
        if (text.includes(w)) score += 1;
        if (kb.title && kb.title.toLowerCase().includes(w)) score += 2;
        if (kb.tags && kb.tags.toLowerCase().includes(w)) score += 1.5;
        if (kb.category && kb.category.toLowerCase().includes(w)) score += 1;
      });
      return { ...kb, score };
    })
    .filter(kb => kb.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 10);

  return scored;
}

async function saveKBEntry(entry) {

    }
    return false;
  } catch(e) {

    return false;
  }
}

  return text
    .replace(/```([\s\S]*?)```/g, '<pre>$1</pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
    .replace(/<\/ul>\s*<ul>/g, '')
    .replace(/\n/g, '<br>');
}

function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';

  const name = file.name;
  const ext = name.split('.').pop().toLowerCase();

  if (['xlsx', 'xls', 'csv'].includes(ext)) {
    readSpreadsheetFile(file, name);
  } else if (['txt', 'json'].includes(ext)) {
    readTextFile(file, name);
  } else {
    addSystemMessage('Supported formats: xlsx, xls, csv, txt, json');
  }
}

function readTextFile(file, name) {
  const reader = new FileReader();
  reader.onload = (e) => {
    showFilePreview(name, e.target.result);
  };
  reader.readAsText(file);
}

function readSpreadsheetFile(file, name) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
      let text = '';
      wb.SheetNames.forEach(sn => {
        const data = XLSX.utils.sheet_to_csv(wb.Sheets[sn]);
        text += `\n=== Sheet: ${sn} ===\n${data}\n`;
      });
      showFilePreview(name, text.trim());
    } catch(err) {
      addSystemMessage('Error reading file: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function showFilePreview(name, content) {
  document.getElementById('fileName').textContent = name;
  document.getElementById('fileContent').value = content;
  document.getElementById('fileOverlay').style.display = 'flex';
}

function closeFilePreview() {
  document.getElementById('fileOverlay').style.display = 'none';
}

function processFileContent() {
  const content = document.getElementById('fileContent').value;
  const name = document.getElementById('fileName').textContent;
  closeFilePreview();

  if (!content.trim()) return;

  addUserMessage(`📎 Uploaded: ${name}`);
  chatHistory.push({ role: 'user', content: `[File uploaded: ${name}]\n\n${content}` });

  processAIResponse(content, true);
}

const MEMORY_TRIGGERS = ['기억해','기억 해','remember','기억하세요','잊지마','잊지 마','메모해','메모 해'];
const MEMORY_LIST_TRIGGERS = ['기억 목록','기억목록','뭐 기억','뭘 기억','기억하고 있','memory list','memories','what do you remember'];
const MEMORY_DELETE_TRIGGERS = ['기억 삭제','기억삭제','잊어버려','잊어 버려','forget','delete memory'];

function isMemoryCommand(text) {
  const lower = text.toLowerCase();
  if (MEMORY_DELETE_TRIGGERS.some(t => lower.includes(t))) return 'delete';
  if (MEMORY_LIST_TRIGGERS.some(t => lower.includes(t))) return 'list';
  if (MEMORY_TRIGGERS.some(t => lower.includes(t))) return 'save';
  return false;
}

function extractMemoryContent(text) {
  // Remove trigger words and DJ: prefix to get the actual content
  let content = text.replace(/^(DJ\s*:\s*)/i, '').trim();
  MEMORY_TRIGGERS.forEach(t => {
    content = content.replace(new RegExp(t, 'gi'), '').trim();
  });
  // Remove common filler: "이거", "이것", "that", "this"
  content = content.replace(/^(이거|이것|that|this)\s*/i, '').trim();
  // Remove trailing punctuation
  content = content.replace(/[.。!！]+$/, '').trim();
  return content;
}

async function saveMemory(content) {
  if (!content || content.length < 2) {
    addBotMessage('💭 기억할 내용을 알려주세요.\n예: "기억해 — 스윈든 가게 수요일마다 배달 옴"');
    return;
  }
  try {
    const entry = {
      category: 'Memory',
      title: content.length > 50 ? content.substring(0, 50) + '...' : content,
      content: content,
      tags: 'memory,owner',
      source: 'chat',
      createdBy: 'DJ'
    };
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      redirect: 'follow',
      body: JSON.stringify({ action: 'saveKB', apikey: API_KEY, entry })
    });
    const json = await JSON.parse(await res.text());
    if (json.status === 'ok') {
      // Add to local kbData too
      entry.id = json.id || Date.now().toString();
      entry.createdAt = new Date().toISOString();
      entry.active = true;
      kbData.push(entry);
      addBotMessage(`✅ 기억했습니다: "${content}"\n\n💡 "기억 목록" — 저장된 기억 보기\n💡 "기억 삭제 [내용]" — 기억 삭제`);
    } else {
      addBotMessage('❌ 저장 실패: ' + (json.error || 'Unknown error'));
    }
  } catch(e) {
    addBotMessage('❌ 저장 오류: ' + e.message);
  }
}

function listMemories() {
  const memories = kbData.filter(kb => kb.category === 'Memory' && kb.active !== false && kb.active !== 'false');
  if (memories.length === 0) {
    addBotMessage('💭 저장된 기억이 없습니다.\n\n"기억해 — [내용]" 으로 기억을 저장해보세요.');
    return;
  }
  let msg = `📋 **저장된 기억 (${memories.length}개)**\n\n`;
  memories.forEach((m, i) => {
    const date = m.createdAt ? m.createdAt.substring(0, 10) : '?';
    msg += `${i + 1}. ${m.content} (${date})\n`;
  });
  msg += '\n💡 "기억 삭제 [번호 또는 내용]" 으로 삭제 가능';
  addBotMessage(msg);
}

async function deleteMemory(text) {
  const memories = kbData.filter(kb => kb.category === 'Memory' && kb.active !== false && kb.active !== 'false');
  if (memories.length === 0) {
    addBotMessage('💭 삭제할 기억이 없습니다.');
    return;
  }
  // Try to match by number or content
  let clean = text.toLowerCase();
  MEMORY_DELETE_TRIGGERS.forEach(t => { clean = clean.replace(t, '').trim(); });
  clean = clean.replace(/^(DJ\s*:\s*)/i, '').trim();

  let target = null;
  const num = parseInt(clean);
  if (!isNaN(num) && num >= 1 && num <= memories.length) {
    target = memories[num - 1];
  } else if (clean.length > 1) {
    target = memories.find(m => m.content.toLowerCase().includes(clean) || m.title.toLowerCase().includes(clean));
  }

  if (!target) {
    addBotMessage('❓ 어떤 기억을 삭제할까요?\n"기억 목록"으로 확인 후 번호를 알려주세요.\n예: "기억 삭제 3"');
    return;
  }

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      redirect: 'follow',
      body: JSON.stringify({ action: 'deleteKB', apikey: API_KEY, id: target.id })
    });
    const json = await JSON.parse(await res.text());
    if (json.status === 'ok') {
      kbData = kbData.filter(kb => kb.id !== target.id);
      addBotMessage(`🗑️ 기억 삭제: "${target.content}"`);
    } else {
      addBotMessage('❌ 삭제 실패: ' + (json.error || 'Unknown'));
    }
  } catch(e) {
    addBotMessage('❌ 삭제 오류: ' + e.message);
  }
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || isSending) return;

  // 모바일 한글 키보드 IME 버그 방지: blur로 조합 종료 후 clear
  input.blur();
  input.value = '';
  input.style.height = 'auto';
  setTimeout(() => input.focus(), 50);
  addUserMessage(text);

  // Check for memory commands first
  const memCmd = isMemoryCommand(text);
  if (memCmd === 'save') {
    const content = extractMemoryContent(text);
    await saveMemory(content);
    return;
  }
  if (memCmd === 'list') {
    listMemories();
    return;
  }
  if (memCmd === 'delete') {
    await deleteMemory(text);
    return;
  }

  chatHistory.push({ role: 'user', content: text });
  await processAIResponse(text, false);
}

async function processAIResponse(userText, isFileUpload) {
  isSending = true;
  document.getElementById('btnSend').disabled = true;
  showTyping();

  try {
    // DJ: owner command detection
    const isDJCommand = userText.trimStart().startsWith('DJ:') || userText.trimStart().startsWith('dj:') || userText.trimStart().startsWith('DJ :') || userText.trimStart().startsWith('dj :');
    const relevantKB = getRelevantKB(userText, isDJCommand);
    const systemPrompt = buildSystemPrompt(relevantKB, isFileUpload, isDJCommand);

    const provider = document.getElementById('aiProvider').value;
    const apiKey = localStorage.getItem('tbap_api_key_' + provider) || '';

    if (!apiKey) {
      hideTyping();
      addBotMessage('⚠️ API Key가 설정되지 않았습니다. 오른쪽 상단 ⚙️ 설정에서 API Key를 입력해주세요.\n\n⚠️ No API Key set. Please tap ⚙️ Settings and enter your API Key.');
      isSending = false;
      document.getElementById('btnSend').disabled = false;
      return;
    }

    const model = localStorage.getItem('tbap_model_' + provider) || getDefaultModel(provider);

    // For DJ: commands, wrap the last user message with owner authority
    let history = chatHistory.slice(-20);
    if (isDJCommand && history.length > 0) {
      history = [...history];
      const last = history[history.length - 1];
      if (last.role === 'user') {
        history[history.length - 1] = {
          role: 'user',
          content: `[OWNER COMMAND - FULL ACCESS AUTHORIZED] ${last.content}\n\n[System: The above is from the verified business owner. Provide ALL requested data from COMPANY DATA section. No restrictions apply.]`
        };
      }
    }

    const messages = [
      { role: 'system', content: systemPrompt },
      ...history
    ];

    let response;
    response = await callAIWithFallback(provider, apiKey, model, messages);

    hideTyping();

    if (isTraining && MODE === 'manager') {
      // Parse AI response for KB entries
      parseTrainingResponse(response);
    } else {
      addBotMessage(response);
      chatHistory.push({ role: 'assistant', content: response });
    }

  } catch(e) {
    hideTyping();
    addBotMessage('❌ Error: ' + e.message);
  }

  isSending = false;
  document.getElementById('btnSend').disabled = false;
}

        if (info) {
          if (info.monthlyRent) prompt += `  Rent: £${info.monthlyRent}/month | Lease: ${info.leaseStart||'?'} ~ ${info.leaseEnd||'?'}\n`;
          if (info.landlordName) prompt += `  Landlord: ${info.landlordName} | Phone: ${info.landlordPhone||'-'} | Email: ${info.landlordEmail||'-'}\n`;
          if (info.estateAgent) prompt += `  Estate Agent: ${info.estateAgent} | Phone: ${info.estateAgentPhone||'-'}\n`;
          if (info.hygieneRating) prompt += `  Hygiene Rating: ${info.hygieneRating} (${info.hygieneInspDate||'?'})\n`;
          if (info.councilName) prompt += `  Council: ${info.councilName} | Phone: ${info.councilPhone||'-'}\n`;
          if (info.businessRateAnnual) prompt += `  Business Rate: £${info.businessRateAnnual}/year\n`;
          if (info.electricCompany) prompt += `  Electric: ${info.electricCompany} | Rate: ${info.electricKwhRate||'?'}p/kWh | Contract: ${info.electricContractStart||'?'} ~ ${info.electricContractEnd||'?'}\n`;
          if (info.phoneCompany) prompt += `  Phone: ${info.phoneCompany} | Contract: ${info.phoneContractStart||'?'} ~ ${info.phoneContractEnd||'?'}\n`;
          if (info.waterCompany) prompt += `  Water: ${info.waterCompany}\n`;
          if (info.cardMachineCompany) prompt += `  Card Machine: ${info.cardMachineCompany} (rate: ${info.cardRate||'?'}%) | Contract: ${info.cardContractStart||'?'} ~ ${info.cardContractEnd||'?'}\n`;
          if (info.fridgeCleanDate) prompt += `  Fridge Clean: ${info.fridgeCleanDate} | Next: ${info.fridgeCleanNext||'?'}\n`;
          if (info.airconCleanDate) prompt += `  Aircon Clean: ${info.airconCleanDate} | Next: ${info.airconCleanNext||'?'}\n`;
          if (info.rentReviewYears) prompt += `  Rent Review: every ${info.rentReviewYears} years\n`;
          if (info.serviceCharge) prompt += `  Service Charge: £${info.serviceCharge}\n`;
          // Custom fields
          for (let ci = 1; ci <= 10; ci++) {
            const lbl = info[`custom${ci}Label`], val = info[`custom${ci}Value`];
            if (lbl && val) prompt += `  ${lbl}: ${val}\n`;
          }
          if (info.memo) prompt += `  Memo: ${info.memo}\n`;
        }
      });
    }

    // Staff (manager mode: full detail, staff mode: names only)
    if (tbmsData.Staff.length > 0) {
      const activeStaff = tbmsData.Staff.filter(s => s.active !== false && s.active !== 'false');
      prompt += `\n## Staff (${activeStaff.length} active)\n`;
      if (MODE === 'manager') {
        activeStaff.forEach(s => {
          const storeName = tbmsData.Stores.find(st => String(st.id) === String(s.storeId))?.name || s.storeId;
          let staffLine = `- ${s.name}${s.nickName?' ('+s.nickName+')':''} | Store: ${storeName} | Mobile: ${s.mobile||'-'} | Email: ${s.email||'-'} | Start: ${s.startDate||'-'} | ClothSize: ${s.clothSize||'-'}${s.leftDate?' | LEFT: '+s.leftDate:''}`;
          if (isDJCommand) {
            staffLine += ` | Rate: £${s.rate||'?'}/hr | Address: ${s.address||'-'} | DOB: ${s.dob||'-'} | NI: ${s.niNo||'-'} | eVisa: ${s.eVisa||'-'} | Bank: ${s.sortCode||'-'}/${s.accountNo||'-'}`;
          }
          prompt += staffLine + '\n';
        });
      } else {
        const byStore = {};
        activeStaff.forEach(s => {
          const storeName = tbmsData.Stores.find(st => String(st.id) === String(s.storeId))?.name || s.storeId;
          if (!byStore[storeName]) byStore[storeName] = [];
          byStore[storeName].push(s.name);
        });
        Object.entries(byStore).forEach(([store, names]) => {
          prompt += `- ${store}: ${names.join(', ')}\n`;
        });
      }
    }

    // Suppliers (manager only)
    if (MODE === 'manager' && tbmsData.Suppliers.length > 0) {
      const activeSup = tbmsData.Suppliers.filter(s => s.active !== false && s.active !== 'false');
      prompt += `\n## Suppliers (${activeSup.length})\n`;
      activeSup.forEach(s => {
        prompt += `- ${s.name} | Phone: ${s.phone||'-'} | Email: ${s.email||'-'} | Website: ${s.website||'-'}\n`;
      });
    }

    // ── Manager-only data ──
    if (MODE === 'manager') {

      // Weekly Sales (latest 8 weeks per store)
      if (tbmsData.WeeklySales.length > 0) {
        prompt += `\n## Weekly Sales (recent)\n`;
        const sorted = [...tbmsData.WeeklySales].sort((a, b) => (b.week || '').localeCompare(a.week || ''));
        const latest = sorted.slice(0, 40); // cap at 40 rows
        const byStore = {};
        latest.forEach(r => {
          const storeName = tbmsData.Stores.find(st => String(st.id) === String(r.storeId))?.name || r.storeId;
          if (!byStore[storeName]) byStore[storeName] = [];
          if (byStore[storeName].length < 8) {
            byStore[storeName].push(`  Week ${r.week}: £${r.totalSales||0}${r.notes?' ('+r.notes+')':''}`);
          }
        });
        Object.entries(byStore).forEach(([store, lines]) => {
          prompt += `- ${store}\n${lines.join('\n')}\n`;
        });
      }

      // Stock Template (menu items)
      if (tbmsData.StockTemplate.length > 0) {
        prompt += `\n## Stock Items (${tbmsData.StockTemplate.length} items)\n`;
        const byCat = {};
        tbmsData.StockTemplate.forEach(t => {
          const cat = t.category || 'Other';
          if (!byCat[cat]) byCat[cat] = [];
          byCat[cat].push(t.name);
        });
        Object.entries(byCat).forEach(([cat, items]) => {
          prompt += `- ${cat}: ${items.join(', ')}\n`;
        });
      }

      // Current Store Stock levels
      if (tbmsData.StoreStock.length > 0) {
        prompt += `\n## Current Stock Levels\n`;
        const byStore = {};
        tbmsData.StoreStock.forEach(s => {
          const storeName = tbmsData.Stores.find(st => String(st.id) === String(s.storeId))?.name || s.storeId;
          if (!byStore[storeName]) byStore[storeName] = [];
          const low = s.min && Number(s.qty) <= Number(s.min);
          byStore[storeName].push(`${s.name}: ${s.qty}${s.unit||''}${low?' ⚠LOW':''}`);
        });
        Object.entries(byStore).forEach(([store, items]) => {
          prompt += `- ${store}: ${items.join(', ')}\n`;
        });
      }

      // Staff Messages
      if (tbmsData.StaffMessages.length > 0) {
        const active = tbmsData.StaffMessages.filter(m => m.active !== false && m.active !== 'false');
        if (active.length > 0) {
          prompt += `\n## Active Staff Messages (${active.length})\n`;
          active.slice(0, 20).forEach(m => {
            const storeName = tbmsData.Stores.find(st => String(st.id) === String(m.storeId))?.name || m.storeId;
            prompt += `- [${storeName}] ${m.type||'notice'}: ${m.message}\n`;
          });
        }
      }

      // Diary entries (latest 7 days)
      if (tbmsData.DiaryEntry.length > 0) {
        const sorted = [...tbmsData.DiaryEntry].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
        const recent = sorted.slice(0, 14); // 7 days × 2 stores max
        if (recent.length > 0) {
          prompt += `\n## Recent Diary Entries\n`;
          recent.forEach(d => {
            const storeName = tbmsData.Stores.find(st => String(st.id) === String(d.storeId))?.name || d.storeId;
            let summary = `- ${d.date} ${storeName}`;
            if (d.issues) summary += ` | Issues: ${d.issues}`;
            if (d.hygieneRating) summary += ` | Hygiene: ${d.hygieneRating}`;
            if (d.signedBy) summary += ` | Signed: ${d.signedBy}`;
            prompt += summary + '\n';
          });
        }
      }

      // Attendance summary (last 7 days only — count per store)
      if (tbmsData.Attendance.length > 0) {
        const today = new Date();
        const weekAgo = new Date(today);
        weekAgo.setDate(weekAgo.getDate() - 7);
        const weekStr = weekAgo.toISOString().slice(0, 10);
        const recent = tbmsData.Attendance.filter(a => (a.date || '') >= weekStr);
        if (recent.length > 0) {
          prompt += `\n## Attendance (last 7 days: ${recent.length} records)\n`;
          const byStore = {};
          recent.forEach(a => {
            const storeName = tbmsData.Stores.find(st => String(st.id) === String(a.storeId))?.name || a.storeId;
            if (!byStore[storeName]) byStore[storeName] = { count: 0, staff: new Set() };
            byStore[storeName].count++;
            const staffName = tbmsData.Staff.find(s => String(s.id) === String(a.staffId))?.name || a.staffId;
            byStore[storeName].staff.add(staffName);
          });
          Object.entries(byStore).forEach(([store, info]) => {
            prompt += `- ${store}: ${info.count} shifts by ${info.staff.size} staff (${[...info.staff].join(', ')})\n`;
          });
        }
      }

      // Diary Config
      if (tbmsData.DiaryConfig.length > 0) {
        const active = tbmsData.DiaryConfig.filter(c => c.active !== false && c.active !== 'false');
        if (active.length > 0) {
          prompt += `\n## Diary Config Items\n`;
          const byType = {};
          active.forEach(c => {
            const t = c.configType || 'Other';
            if (!byType[t]) byType[t] = [];
            byType[t].push(c.name);
          });
          Object.entries(byType).forEach(([type, names]) => {
            prompt += `- ${type}: ${names.join(', ')}\n`;
          });
        }
      }
    }

    prompt += '\n=== END COMPANY DATA ===\n';

    // Always inject ALL memories (these are owner's persistent notes)
    // Memories: filter by access level (memories default to 'dj' access)
    const allowedMemAccess = isDJCommand ? ['customer','staff','manager','dj'] :
                          MODE === 'manager' ? ['customer','staff','manager'] : ['customer','staff'];
    const memories = kbData.filter(kb => kb.category === 'Memory' && kb.active !== false && kb.active !== 'false' && allowedMemAccess.includes(kb.accessLevel || 'dj'));
    if (memories.length > 0) {
      prompt += '\n=== MEMORIES (saved notes — always use these) ===\n';
      memories.forEach(m => {
        prompt += `- ${m.content}\n`;
      });
      prompt += '=== END MEMORIES ===\n';
      prompt += 'IMPORTANT: The above memories are facts the owner told you to remember. Use them when answering related questions.\n';
    }

    // Inject Knowledge Base entries (relevant to query)
    const nonMemoryKB = relevantKB.filter(kb => kb.category !== 'Memory');
    if (nonMemoryKB.length > 0) {
      prompt += '\n=== KNOWLEDGE BASE (relevant entries) ===\n';
      nonMemoryKB.forEach(kb => {
        prompt += `\n[${kb.category}] ${kb.title}\n${kb.content}\n`;
        if (kb.tags) prompt += `Tags: ${kb.tags}\n`;
      });
      prompt += '\n=== END KNOWLEDGE BASE ===\n';
    }
  }

  return prompt;
}

function parseTrainingResponse(response) {
  // Try to parse as JSON array
  try {
    let jsonStr = response;
    // Extract JSON from markdown code blocks if present
    const match = response.match(/```(?:json)?\s*([\s\S]*?)```/);
    if (match) jsonStr = match[1];

    const entries = JSON.parse(jsonStr.trim());
    if (Array.isArray(entries) && entries.length > 0) {
      const baseIndex = pendingKBEntries.length;
      entries.forEach((entry, i) => {
        entry.source = 'training';
        entry.createdBy = 'manager';
        pendingKBEntries.push(entry);
      });

      let html = `<div class="msg msg-bot">📚 Extracted <strong>${entries.length}</strong> knowledge entries. Review and save:<br><br>`;
      entries.forEach((entry, i) => {
        html += renderKBPreview(entry, baseIndex + i);
      });
      html += '</div>';

      const div = document.createElement('div');
      div.innerHTML = html;
      document.getElementById('chatArea').appendChild(div.firstChild);
      scrollToBottom();

      chatHistory.push({ role: 'assistant', content: `[Extracted ${entries.length} KB entries for review]` });
      return;
    }
  } catch(e) {
    // Not JSON — treat as regular response
  }

  // Regular text response
  addBotMessage(response);
  chatHistory.push({ role: 'assistant', content: response });
}

// ============================================================
//  AI Provider Calls
// ============================================================
function getDefaultModel(provider) {
  if (provider === 'chatgpt') return 'gpt-4o';
  if (provider === 'gemini') return 'gemini-2.0-flash';
  return 'claude-sonnet-4-20250514';
}

async function callChatGPT(apiKey, model, messages) {
  const res = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
    body: JSON.stringify({ model, messages, max_tokens: 4096, temperature: 0.7 })
  });
  if (!res.ok) {
    const err = new Error('ChatGPT API error: ' + res.status);
    err.status = res.status;
    err.provider = 'chatgpt';
    throw err;
  }
  const data = await res.json();
  return data.choices[0].message.content;
}

async function callGemini(apiKey, model, messages) {
  const contents = messages.filter(m => m.role !== 'system').map(m => ({
    role: m.role === 'assistant' ? 'model' : 'user',
    parts: [{ text: m.content }]
  }));
  const sysMsg = messages.find(m => m.role === 'system');
  const body = { contents };
  if (sysMsg) body.systemInstruction = { parts: [{ text: sysMsg.content }] };
  body.generationConfig = { maxOutputTokens: 4096, temperature: 0.7 };

  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    const err = new Error('Gemini API error: ' + res.status);
    err.status = res.status;
    err.provider = 'gemini';
    throw err;
  }
  const data = await res.json();
  return data.candidates[0].content.parts[0].text;
}

async function callClaude(apiKey, model, messages) {
  const sysMsg = messages.find(m => m.role === 'system');
  const msgs = messages.filter(m => m.role !== 'system');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model,
      max_tokens: 4096,
      system: sysMsg ? sysMsg.content : '',
      messages: msgs
    })
  });
  if (!res.ok) {
    const err = new Error('Claude API error: ' + res.status);
    err.status = res.status;
    err.provider = 'claude';
    throw err;
  }
  const data = await res.json();
  return data.content[0].text;
}

// Smart AI caller: auto-retry + auto-fallback to other providers
const PROVIDER_ORDER = ['chatgpt', 'gemini', 'claude'];

async function callAIWithFallback(primaryProvider, primaryKey, primaryModel, messages) {
  // 1) Try primary provider with retry
  try {
    return await callProviderWithRetry(primaryProvider, primaryKey, primaryModel, messages);
  } catch(e) {
    console.warn(`Primary (${primaryProvider}) failed:`, e.message);
  }

  // 2) Auto-fallback to other providers
  const fallbacks = PROVIDER_ORDER.filter(p => p !== primaryProvider);
  for (const fb of fallbacks) {
    const fbKey = localStorage.getItem('tbap_api_key_' + fb);
    if (!fbKey) continue; // no API key for this provider

    const fbModel = localStorage.getItem('tbap_model_' + fb) || getDefaultModel(fb);
    try {
      addSystemNote(`⚡ ${primaryProvider} 응답 불가 → ${fb}로 자동 전환`);
      const result = await callProviderWithRetry(fb, fbKey, fbModel, messages);
      return result;
    } catch(e2) {
      console.warn(`Fallback (${fb}) also failed:`, e2.message);
    }
  }

  // 3) All providers failed
  throw new Error('모든 AI 서비스가 응답하지 않습니다. 잠시 후 다시 시도해주세요.\n\n💡 Settings에서 여러 AI의 API Key를 등록하면 자동 전환됩니다.');
}

async function callProviderWithRetry(provider, apiKey, model, messages, maxRetries = 2) {
  for (let attempt = 0; attempt <= maxRetries; attempt++) {
    try {
      if (provider === 'chatgpt') return await callChatGPT(apiKey, model, messages);
      if (provider === 'gemini') return await callGemini(apiKey, model, messages);
      return await callClaude(apiKey, model, messages);
    } catch(e) {
      const isRateLimit = e.status === 429;
      const isServerError = e.status >= 500;
      if ((isRateLimit || isServerError) && attempt < maxRetries) {
        const wait = (attempt + 1) * 3000; // 3s, 6s
        addSystemNote(`⏳ ${provider} 일시적 오류 (${e.status}) — ${wait/1000}초 후 재시도...`);
        await new Promise(r => setTimeout(r, wait));
        continue;
      }
      throw e;
    }
  }
}

function addSystemNote(text) {
  const chatArea = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg msg-system';
  div.style.cssText = 'font-size:11px;color:var(--accent);opacity:.8;padding:4px 12px';
  div.textContent = text;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

// ============================================================
//  Settings & Storage
// ============================================================
function loadLocalSettings() {
  const provider = localStorage.getItem('tbap_bot_provider') || 'chatgpt';
  document.getElementById('aiProvider').value = provider;
  document.getElementById('setProvider').value = provider;
  const key = localStorage.getItem('tbap_api_key_' + provider) || '';
  document.getElementById('setApiKey').value = key;
  const model = localStorage.getItem('tbap_model_' + provider) || '';
  document.getElementById('setModel').value = model;
}

function saveSettings() {
  const provider = document.getElementById('setProvider').value;
  const apiKey = document.getElementById('setApiKey').value.trim();
  const model = document.getElementById('setModel').value.trim();

  localStorage.setItem('tbap_bot_provider', provider);
  if (apiKey) localStorage.setItem('tbap_api_key_' + provider, apiKey);
  if (model) localStorage.setItem('tbap_model_' + provider, model);

  document.getElementById('aiProvider').value = provider;
  toggleSettings();
  addSystemMessage('Settings saved ✓');
}

function saveLocalSetting(key, val) {
  localStorage.setItem('tbap_' + key, val);
}

function toggleSettings() {
  const panel = document.getElementById('settingsPanel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) {
    loadLocalSettings();
  }
}
