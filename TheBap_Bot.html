<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>The Bap AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg:#0f0f0f; --surface:#1a1a1a; --surface2:#242424; --surface3:#2e2e2e;
  --text:#e8e8e8; --text-light:#999; --text-dim:#666;
  --accent:#e67e22; --accent-light:#f39c12; --accent-dark:#d35400;
  --success:#27ae60; --danger:#e74c3c; --info:#3498db;
  --bot-bg:#1e2a1e; --user-bg:#1a2436;
  --radius:12px; --radius-sm:8px;
  --shadow:0 2px 8px rgba(0,0,0,.3);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* ─── Header ─── */
.header{background:var(--surface);padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--surface3);flex-shrink:0}
.header-logo{width:36px;height:36px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff}
.header-info{flex:1}
.header-title{font-size:15px;font-weight:600}
.header-mode{font-size:11px;color:var(--accent);font-weight:500}
.header-btn{background:none;border:none;color:var(--text-light);font-size:18px;cursor:pointer;padding:6px}
.header-btn:hover{color:var(--accent)}

/* ─── PIN Modal ─── */
.pin-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:1000}
.pin-box{background:var(--surface);padding:32px 24px;border-radius:var(--radius);text-align:center;width:90%;max-width:320px}
.pin-box h3{margin-bottom:16px;font-size:18px}
.pin-box input{width:100%;padding:12px;font-size:20px;text-align:center;letter-spacing:8px;background:var(--surface2);border:1px solid var(--surface3);border-radius:var(--radius-sm);color:var(--text);outline:none}
.pin-box input:focus{border-color:var(--accent)}
.pin-box .pin-err{color:var(--danger);font-size:12px;margin-top:8px;min-height:16px}
.pin-box button{margin-top:16px;width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer}

/* ─── Chat Area ─── */
.chat-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.msg{max-width:85%;padding:12px 16px;border-radius:var(--radius);font-size:14px;line-height:1.6;word-wrap:break-word;animation:fadeIn .2s ease}
.msg-bot{background:var(--bot-bg);align-self:flex-start;border-bottom-left-radius:4px}
.msg-user{background:var(--user-bg);align-self:flex-end;border-bottom-right-radius:4px}
.msg-system{background:var(--surface2);align-self:center;text-align:center;font-size:12px;color:var(--text-light);padding:8px 16px;border-radius:20px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Typing indicator */
.typing{display:flex;gap:4px;padding:12px 16px;align-self:flex-start}
.typing span{width:8px;height:8px;background:var(--text-dim);border-radius:50%;animation:bounce .6s infinite alternate}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{to{transform:translateY(-6px);background:var(--accent)}}

/* KB Preview Card (Training Mode) */
.kb-preview{background:var(--surface2);border:1px solid var(--surface3);border-radius:var(--radius-sm);padding:12px;margin-top:8px}
.kb-preview .kb-cat{font-size:11px;color:var(--accent);font-weight:600;text-transform:uppercase;margin-bottom:4px}
.kb-preview .kb-title{font-size:14px;font-weight:600;margin-bottom:6px}
.kb-preview .kb-content{font-size:13px;color:var(--text-light);white-space:pre-wrap;margin-bottom:8px;max-height:200px;overflow-y:auto}
.kb-preview .kb-tags{font-size:11px;color:var(--info)}
.kb-preview .kb-actions{display:flex;gap:8px;margin-top:10px}
.kb-preview .kb-actions button{flex:1;padding:8px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer}
.kb-preview .kb-save{background:var(--success);color:#fff}
.kb-preview .kb-edit{background:var(--surface3);color:var(--text)}
.kb-preview .kb-discard{background:var(--danger);color:#fff}

/* ─── Input Area ─── */
.input-area{background:var(--surface);padding:12px 16px;border-top:1px solid var(--surface3);flex-shrink:0}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-row textarea{flex:1;background:var(--surface2);border:1px solid var(--surface3);border-radius:var(--radius-sm);padding:10px 14px;font-size:14px;color:var(--text);resize:none;max-height:120px;outline:none;font-family:inherit;line-height:1.5}
.input-row textarea:focus{border-color:var(--accent)}
.input-row button{width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.btn-send{background:var(--accent);color:#fff}
.btn-send:disabled{opacity:.4;cursor:default}
.btn-attach{background:var(--surface3);color:var(--text-light)}
.btn-attach:hover{color:var(--accent)}
.input-controls{display:flex;align-items:center;gap:12px;margin-top:8px}
.training-toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-light);cursor:pointer}
.training-toggle input{display:none}
.training-toggle .toggle-track{width:36px;height:20px;background:var(--surface3);border-radius:10px;position:relative;transition:.2s}
.training-toggle input:checked+.toggle-track{background:var(--success)}
.training-toggle .toggle-thumb{width:16px;height:16px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:.2s}
.training-toggle input:checked+.toggle-track .toggle-thumb{left:18px}
.provider-select{font-size:11px;color:var(--text-dim);margin-left:auto}
.provider-select select{background:var(--surface2);color:var(--text-light);border:1px solid var(--surface3);border-radius:4px;padding:2px 6px;font-size:11px}

/* ─── Settings Panel ─── */
.settings-panel{position:fixed;top:0;right:-100%;width:100%;max-width:360px;height:100%;background:var(--surface);z-index:500;transition:right .3s;overflow-y:auto;padding:20px}
.settings-panel.open{right:0}
.settings-panel h3{font-size:16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.settings-panel label{font-size:12px;color:var(--text-light);display:block;margin:12px 0 4px}
.settings-panel input,.settings-panel select{width:100%;padding:10px;background:var(--surface2);border:1px solid var(--surface3);border-radius:var(--radius-sm);color:var(--text);font-size:14px}
.settings-panel .btn-save{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;margin-top:20px}

/* ─── File upload overlay ─── */
.file-preview-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:600;padding:20px}
.file-preview-box{background:var(--surface);border-radius:var(--radius);width:100%;max-width:500px;max-height:80vh;overflow-y:auto;padding:24px}
.file-preview-box h3{margin-bottom:12px}
.file-preview-box .file-name{font-size:13px;color:var(--text-light);margin-bottom:16px}
.file-preview-box textarea{width:100%;min-height:200px;background:var(--surface2);border:1px solid var(--surface3);border-radius:var(--radius-sm);color:var(--text);padding:12px;font-size:13px;resize:vertical}
.file-preview-box .fp-btns{display:flex;gap:8px;margin-top:16px}
.file-preview-box .fp-btns button{flex:1;padding:10px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer}

/* ─── Responsive ─── */
@media(max-width:480px){
  .msg{max-width:92%}
}
/* Markdown-like */
.msg-bot b,.msg-bot strong{color:var(--accent-light)}
.msg-bot code{background:var(--surface3);padding:2px 6px;border-radius:4px;font-size:12px}
.msg-bot pre{background:var(--surface3);padding:10px;border-radius:6px;overflow-x:auto;margin:8px 0;font-size:12px}
.msg-bot ul,.msg-bot ol{margin:6px 0 6px 20px}
.msg-bot li{margin:3px 0}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-logo">TB</div>
  <div class="header-info">
    <div class="header-title" id="hdrTitle">The Bap Staff AI</div>
    <div class="header-mode" id="hdrMode">Staff Mode</div>
  </div>
  <button class="header-btn" onclick="toggleSettings()" title="Settings"><i class="fas fa-cog"></i></button>
</div>

<!-- PIN Modal (hidden by default) -->
<div class="pin-overlay" id="pinModal" style="display:none">
  <div class="pin-box">
    <h3><i class="fas fa-lock" style="color:var(--accent);margin-right:8px"></i>Manager Access</h3>
    <p style="font-size:13px;color:var(--text-light);margin-bottom:16px">Enter PIN to access The Bap AI Bot</p>
    <input type="password" id="pinInput" maxlength="6" placeholder="••••" onkeydown="if(event.key==='Enter')verifyPin()">
    <div class="pin-err" id="pinErr"></div>
    <button onclick="verifyPin()">Unlock</button>
    <p style="font-size:11px;color:var(--text-dim);margin-top:12px;cursor:pointer" onclick="fallbackStaff()">Continue as Staff →</p>
  </div>
</div>

<!-- Chat Area -->
<div class="chat-area" id="chatArea">
  <div class="msg msg-system">Welcome! Ask me anything about The Bap.</div>
</div>

<!-- Input Area -->
<div class="input-area">
  <div class="input-row">
    <button class="btn-attach" id="btnAttach" style="display:none" onclick="document.getElementById('fileInput').click()" title="Upload file">
      <i class="fas fa-paperclip"></i>
    </button>
    <input type="file" id="fileInput" style="display:none" accept=".xlsx,.xls,.csv,.txt,.pdf,.json" onchange="handleFileUpload(event)">
    <textarea id="msgInput" rows="1" placeholder="Ask me anything..." onkeydown="handleInputKey(event)" oninput="autoResize(this)"></textarea>
    <button class="btn-send" id="btnSend" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
  </div>
  <div class="input-controls">
    <label class="training-toggle" id="trainingToggle" style="display:none">
      <input type="checkbox" id="trainingMode" onchange="toggleTrainingMode()">
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
      <span>Training</span>
    </label>
    <div class="provider-select">
      <select id="aiProvider" onchange="saveLocalSetting('botProvider',this.value)">
        <option value="chatgpt">ChatGPT</option>
        <option value="gemini">Gemini</option>
        <option value="claude">Claude</option>
      </select>
    </div>
  </div>
</div>

<!-- Settings Panel -->
<div class="settings-panel" id="settingsPanel">
  <h3>Bot Settings <button class="header-btn" onclick="toggleSettings()"><i class="fas fa-times"></i></button></h3>
  <label>AI Provider</label>
  <select id="setProvider" onchange="document.getElementById('aiProvider').value=this.value">
    <option value="chatgpt">ChatGPT (GPT-4o)</option>
    <option value="gemini">Gemini 2.0 Flash</option>
    <option value="claude">Claude Sonnet</option>
  </select>
  <label>API Key</label>
  <input type="password" id="setApiKey" placeholder="Enter your API key">
  <label>Model Override (optional)</label>
  <input type="text" id="setModel" placeholder="e.g. gpt-4o-mini">
  <button class="btn-save" onclick="saveSettings()">Save Settings</button>
  <p style="font-size:11px;color:var(--text-dim);margin-top:16px;text-align:center">The Bap AI Brain • Programmed by DJ</p>
</div>

<!-- File Preview Overlay -->
<div class="file-preview-overlay" id="fileOverlay" style="display:none">
  <div class="file-preview-box">
    <h3><i class="fas fa-file-alt" style="color:var(--accent);margin-right:8px"></i>File Content</h3>
    <div class="file-name" id="fileName"></div>
    <textarea id="fileContent" placeholder="File content will appear here..."></textarea>
    <div class="fp-btns">
      <button style="background:var(--surface3);color:var(--text)" onclick="closeFilePreview()">Cancel</button>
      <button style="background:var(--accent);color:#fff" onclick="processFileContent()">Send to AI</button>
    </div>
  </div>
</div>

<script>
// ============================================================
//  The Bap AI Bot — Ver1.1
//  Programmed by DJ Kim
// ============================================================
const API_URL = 'https://script.google.com/macros/s/AKfycbzND88jsQ45x2Fmgtp4PphIUWEFp29VNaOuO3fYkeH_czTcXFjskQdydDQcvh63thxf/exec';
const API_KEY = 'tBaP2026xKr!mGt9Qz';

const KB_CATEGORIES = [
  'Brand Philosophy','Menu & Recipes','Sauce Recipes','Supplier Info',
  'Staff Training','Kitchen Ops','Store Ops','Marketing','Expansion'
];

const STAFF_CATEGORIES = [
  'Menu & Recipes','Sauce Recipes','Staff Training','Kitchen Ops','Store Ops'
];

// State
let MODE = 'staff'; // 'staff' or 'manager'
let isTraining = false;
let chatHistory = [];
let kbData = [];
let tbmsData = { Stores:[], Staff:[], Suppliers:[], StoreInfo:[] };
let isSending = false;
let pendingKBEntries = [];

// ============================================================
//  Init
// ============================================================
window.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(window.location.search);
  const mode = params.get('mode');

  // Load saved settings
  loadLocalSettings();

  if (mode === 'manager') {
    const pin = params.get('pin');
    const savedPin = localStorage.getItem('tbap_mgr_pin');
    if (pin && savedPin && pin === savedPin) {
      activateManager();
    } else {
      document.getElementById('pinModal').style.display = 'flex';
    }
  } else {
    activateStaff();
  }

  // Load KB + TBMS data
  await Promise.all([loadKB(), loadTBMSData()]);
});

function activateStaff() {
  MODE = 'staff';
  document.getElementById('hdrTitle').textContent = 'The Bap Staff AI';
  document.getElementById('hdrMode').textContent = 'Staff Mode';
  document.getElementById('trainingToggle').style.display = 'none';
  document.getElementById('btnAttach').style.display = 'none';
  document.getElementById('pinModal').style.display = 'none';
  addBotMessage("안녕하세요! The Bap Staff AI입니다. 레시피, 조리법, 매장 운영 절차 등 무엇이든 물어보세요.\n\nHello! I'm The Bap Staff AI. Ask me about recipes, cooking methods, or store procedures.");
}

function activateManager() {
  MODE = 'manager';
  document.getElementById('hdrTitle').textContent = 'The Bap AI Bot';
  document.getElementById('hdrMode').textContent = 'Manager Mode';
  document.getElementById('trainingToggle').style.display = 'flex';
  document.getElementById('btnAttach').style.display = 'flex';
  document.getElementById('pinModal').style.display = 'none';
  addBotMessage("The Bap AI Bot 활성화. 운영, 마케팅, 전략 등 무엇이든 물어보세요.\nTraining Mode를 켜면 새로운 지식을 가르칠 수 있습니다.\n\nThe Bap AI Bot activated. Ask about operations, marketing, strategy, or anything.\nTurn on Training Mode to teach me new knowledge.");
}

function verifyPin() {
  const pin = document.getElementById('pinInput').value;
  const savedPin = localStorage.getItem('tbap_mgr_pin');
  if (!savedPin) {
    // No PIN set yet → accept first PIN as setup
    if (pin.length >= 4) {
      localStorage.setItem('tbap_mgr_pin', pin);
      activateManager();
    } else {
      document.getElementById('pinErr').textContent = 'PIN must be at least 4 digits';
    }
    return;
  }
  if (pin === savedPin) {
    activateManager();
  } else {
    document.getElementById('pinErr').textContent = 'Incorrect PIN';
    document.getElementById('pinInput').value = '';
  }
}

function fallbackStaff() {
  document.getElementById('pinModal').style.display = 'none';
  activateStaff();
}

// ============================================================
//  Knowledge Base
// ============================================================
async function loadKB() {
  try {
    const res = await fetch(`${API_URL}?action=getKB&apikey=${encodeURIComponent(API_KEY)}`, {redirect:'follow'});
    const json = await res.json();
    if (json.status === 'ok') {
      kbData = json.data || [];
    }
  } catch(e) {
    console.log('KB load error:', e);
  }
}

async function loadTBMSData() {
  const sheets = ['Stores', 'Staff', 'Suppliers', 'StoreInfo'];
  const results = [];
  for (const sheet of sheets) {
    try {
      const url = `${API_URL}?action=getSheet&sheet=${sheet}&apikey=${encodeURIComponent(API_KEY)}`;
      const res = await fetch(url, {redirect:'follow'});
      const text = await res.text();
      let json;
      try { json = JSON.parse(text); } catch(pe) {
        console.error(`${sheet} parse error:`, text.substring(0, 200));
        continue;
      }
      if (json.status === 'ok' && json.data) {
        tbmsData[sheet] = json.data;
        results.push(`${sheet}:${json.data.length}`);
      } else {
        console.warn(`${sheet} response:`, json.error || 'no data');
      }
    } catch(e) {
      console.error(`${sheet} fetch error:`, e.message);
    }
  }
  const total = sheets.reduce((n, s) => n + tbmsData[s].length, 0);
  if (total > 0) {
    console.log('TBMS data loaded:', results.join(', '));
    updateStatusBadge('✓ Data loaded', 'ok');
  } else {
    console.warn('TBMS data: 0 records loaded');
    updateStatusBadge('⚠ No company data', 'warn');
  }
}

function updateStatusBadge(text, type) {
  let badge = document.getElementById('dataBadge');
  if (!badge) {
    badge = document.createElement('div');
    badge.id = 'dataBadge';
    badge.style.cssText = 'position:fixed;top:60px;right:8px;font-size:10px;padding:2px 8px;border-radius:10px;z-index:100;opacity:.8';
    document.body.appendChild(badge);
  }
  badge.textContent = text;
  badge.style.background = type === 'ok' ? 'var(--success)' : 'var(--danger)';
  badge.style.color = '#fff';
  setTimeout(() => { if (badge) badge.style.opacity = '0.4'; }, 5000);
}

function getRelevantKB(query) {
  if (!kbData.length) return [];
  const q = query.toLowerCase();
  const words = q.split(/\s+/).filter(w => w.length > 1);

  const categories = MODE === 'staff' ? STAFF_CATEGORIES : KB_CATEGORIES;

  const scored = kbData
    .filter(kb => categories.includes(kb.category))
    .map(kb => {
      let score = 0;
      const text = `${kb.title} ${kb.content} ${kb.tags} ${kb.category}`.toLowerCase();
      words.forEach(w => {
        if (text.includes(w)) score += 1;
        if (kb.title.toLowerCase().includes(w)) score += 2;
        if (kb.tags && kb.tags.toLowerCase().includes(w)) score += 1.5;
      });
      return { ...kb, score };
    })
    .filter(kb => kb.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 8);

  return scored;
}

async function saveKBEntry(entry) {
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'saveKB', apikey: API_KEY, entry }),
      redirect: 'follow'
    });
    const json = await res.json();
    if (json.status === 'ok') {
      await loadKB();
      return true;
    }
    return false;
  } catch(e) {
    console.error('KB save error:', e);
    return false;
  }
}

// ============================================================
//  Chat UI
// ============================================================
function addBotMessage(text) {
  const div = document.createElement('div');
  div.className = 'msg msg-bot';
  div.innerHTML = formatMsg(text);
  document.getElementById('chatArea').appendChild(div);
  scrollToBottom();
  return div;
}

function addUserMessage(text) {
  const div = document.createElement('div');
  div.className = 'msg msg-user';
  div.textContent = text;
  document.getElementById('chatArea').appendChild(div);
  scrollToBottom();
}

function addSystemMessage(text) {
  const div = document.createElement('div');
  div.className = 'msg msg-system';
  div.textContent = text;
  document.getElementById('chatArea').appendChild(div);
  scrollToBottom();
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typingIndicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  document.getElementById('chatArea').appendChild(div);
  scrollToBottom();
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function scrollToBottom() {
  const area = document.getElementById('chatArea');
  setTimeout(() => area.scrollTop = area.scrollHeight, 50);
}

function formatMsg(text) {
  if (!text) return '';
  return text
    .replace(/```([\s\S]*?)```/g, '<pre>$1</pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
    .replace(/<\/ul>\s*<ul>/g, '')
    .replace(/\n/g, '<br>');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// ============================================================
//  Training Mode
// ============================================================
function toggleTrainingMode() {
  isTraining = document.getElementById('trainingMode').checked;
  if (isTraining) {
    addSystemMessage('📚 Training Mode ON — Tell me facts, recipes, procedures, or upload files. I\'ll organize and save them.');
  } else {
    addSystemMessage('Training Mode OFF — Back to Q&A mode.');
  }
}

function renderKBPreview(entry, index) {
  return `<div class="kb-preview" id="kbPreview${index}">
    <div class="kb-cat">${entry.category}</div>
    <div class="kb-title">${entry.title}</div>
    <div class="kb-content">${entry.content}</div>
    <div class="kb-tags"><i class="fas fa-tags"></i> ${entry.tags}</div>
    <div class="kb-actions">
      <button class="kb-save" onclick="confirmSaveKB(${index})"><i class="fas fa-check"></i> Save</button>
      <button class="kb-edit" onclick="editKBPreview(${index})"><i class="fas fa-edit"></i> Edit</button>
      <button class="kb-discard" onclick="discardKBPreview(${index})"><i class="fas fa-times"></i> Discard</button>
    </div>
  </div>`;
}

async function confirmSaveKB(index) {
  const entry = pendingKBEntries[index];
  if (!entry) return;
  const el = document.getElementById('kbPreview' + index);
  const ok = await saveKBEntry(entry);
  if (ok) {
    if (el) el.innerHTML = '<div style="color:var(--success);font-size:13px"><i class="fas fa-check-circle"></i> Saved: ' + entry.title + '</div>';
    addSystemMessage('✅ "' + entry.title + '" saved to Knowledge Base.');
  } else {
    addSystemMessage('❌ Failed to save. Please try again.');
  }
}

function editKBPreview(index) {
  const entry = pendingKBEntries[index];
  if (!entry) return;
  const el = document.getElementById('kbPreview' + index);
  if (!el) return;
  el.innerHTML = `
    <label style="font-size:11px;color:var(--text-light)">Category</label>
    <select id="kbEdit${index}Cat" style="width:100%;padding:6px;background:var(--surface3);border:1px solid var(--surface3);border-radius:4px;color:var(--text);margin-bottom:6px;font-size:13px">
      ${KB_CATEGORIES.map(c => `<option ${c===entry.category?'selected':''}>${c}</option>`).join('')}
    </select>
    <label style="font-size:11px;color:var(--text-light)">Title</label>
    <input id="kbEdit${index}Title" value="${entry.title.replace(/"/g,'&quot;')}" style="width:100%;padding:6px;background:var(--surface3);border:1px solid var(--surface3);border-radius:4px;color:var(--text);margin-bottom:6px;font-size:13px">
    <label style="font-size:11px;color:var(--text-light)">Content</label>
    <textarea id="kbEdit${index}Content" style="width:100%;min-height:100px;padding:6px;background:var(--surface3);border:1px solid var(--surface3);border-radius:4px;color:var(--text);margin-bottom:6px;font-size:13px;resize:vertical">${entry.content}</textarea>
    <label style="font-size:11px;color:var(--text-light)">Tags (comma separated)</label>
    <input id="kbEdit${index}Tags" value="${(entry.tags||'').replace(/"/g,'&quot;')}" style="width:100%;padding:6px;background:var(--surface3);border:1px solid var(--surface3);border-radius:4px;color:var(--text);margin-bottom:8px;font-size:13px">
    <div class="kb-actions">
      <button class="kb-save" onclick="saveEditedKB(${index})"><i class="fas fa-check"></i> Save</button>
      <button class="kb-discard" onclick="discardKBPreview(${index})"><i class="fas fa-times"></i> Cancel</button>
    </div>`;
}

async function saveEditedKB(index) {
  const cat = document.getElementById('kbEdit'+index+'Cat').value;
  const title = document.getElementById('kbEdit'+index+'Title').value;
  const content = document.getElementById('kbEdit'+index+'Content').value;
  const tags = document.getElementById('kbEdit'+index+'Tags').value;
  pendingKBEntries[index] = { category: cat, title, content, tags, source: 'training', createdBy: MODE };
  await confirmSaveKB(index);
}

function discardKBPreview(index) {
  const el = document.getElementById('kbPreview' + index);
  if (el) el.innerHTML = '<div style="color:var(--text-dim);font-size:12px"><i class="fas fa-trash"></i> Discarded</div>';
}

// ============================================================
//  File Upload
// ============================================================
function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';

  const name = file.name;
  const ext = name.split('.').pop().toLowerCase();

  if (['xlsx', 'xls', 'csv'].includes(ext)) {
    readSpreadsheetFile(file, name);
  } else if (['txt', 'json'].includes(ext)) {
    readTextFile(file, name);
  } else {
    addSystemMessage('Supported formats: xlsx, xls, csv, txt, json');
  }
}

function readTextFile(file, name) {
  const reader = new FileReader();
  reader.onload = (e) => {
    showFilePreview(name, e.target.result);
  };
  reader.readAsText(file);
}

function readSpreadsheetFile(file, name) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
      let text = '';
      wb.SheetNames.forEach(sn => {
        const data = XLSX.utils.sheet_to_csv(wb.Sheets[sn]);
        text += `\n=== Sheet: ${sn} ===\n${data}\n`;
      });
      showFilePreview(name, text.trim());
    } catch(err) {
      addSystemMessage('Error reading file: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function showFilePreview(name, content) {
  document.getElementById('fileName').textContent = name;
  document.getElementById('fileContent').value = content;
  document.getElementById('fileOverlay').style.display = 'flex';
}

function closeFilePreview() {
  document.getElementById('fileOverlay').style.display = 'none';
}

function processFileContent() {
  const content = document.getElementById('fileContent').value;
  const name = document.getElementById('fileName').textContent;
  closeFilePreview();

  if (!content.trim()) return;

  addUserMessage(`📎 Uploaded: ${name}`);
  chatHistory.push({ role: 'user', content: `[File uploaded: ${name}]\n\n${content}` });

  processAIResponse(content, true);
}

// ============================================================
//  Send Message & AI
// ============================================================
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || isSending) return;

  input.value = '';
  input.style.height = 'auto';
  addUserMessage(text);
  chatHistory.push({ role: 'user', content: text });

  await processAIResponse(text, false);
}

async function processAIResponse(userText, isFileUpload) {
  isSending = true;
  document.getElementById('btnSend').disabled = true;
  showTyping();

  try {
    const relevantKB = getRelevantKB(userText);
    const systemPrompt = buildSystemPrompt(relevantKB, isFileUpload);

    const provider = document.getElementById('aiProvider').value;
    const apiKey = localStorage.getItem('tbap_api_key_' + provider) || '';

    if (!apiKey) {
      hideTyping();
      addBotMessage('⚠️ API Key가 설정되지 않았습니다. 오른쪽 상단 ⚙️ 설정에서 API Key를 입력해주세요.\n\n⚠️ No API Key set. Please tap ⚙️ Settings and enter your API Key.');
      isSending = false;
      document.getElementById('btnSend').disabled = false;
      return;
    }

    const model = localStorage.getItem('tbap_model_' + provider) || getDefaultModel(provider);
    const messages = [
      { role: 'system', content: systemPrompt },
      ...chatHistory.slice(-20) // Last 20 messages for context
    ];

    let response;
    if (provider === 'chatgpt') {
      response = await callChatGPT(apiKey, model, messages);
    } else if (provider === 'gemini') {
      response = await callGemini(apiKey, model, messages);
    } else {
      response = await callClaude(apiKey, model, messages);
    }

    hideTyping();

    if (isTraining && MODE === 'manager') {
      // Parse AI response for KB entries
      parseTrainingResponse(response);
    } else {
      addBotMessage(response);
      chatHistory.push({ role: 'assistant', content: response });
    }

  } catch(e) {
    hideTyping();
    addBotMessage('❌ Error: ' + e.message);
  }

  isSending = false;
  document.getElementById('btnSend').disabled = false;
}

function buildSystemPrompt(relevantKB, isFileUpload) {
  let prompt = '';

  if (isTraining && MODE === 'manager') {
    prompt = `You are The Bap AI Brain's training assistant. The user is teaching you new knowledge about "The Bap" restaurant chain.

Your job: Extract structured knowledge from the user's input and return it as JSON entries.

IMPORTANT: Respond ONLY with a JSON array. Each entry must have:
- category: one of [${KB_CATEGORIES.join(', ')}]
- title: concise title (max 60 chars)
- content: detailed content
- tags: comma-separated relevant tags

Example response:
[{"category":"Menu & Recipes","title":"Bibimbap Recipe","content":"Ingredients: rice, mixed vegetables, gochujang sauce...","tags":"bibimbap,recipe,main dish"}]

If the input is conversational (greeting, question), respond with regular text (not JSON).
The user may input in Korean or English. Preserve the language of the content.`;
  } else {
    prompt = `You are "${MODE === 'manager' ? 'The Bap AI Bot' : 'The Bap Staff AI'}", an AI assistant for "The Bap" Korean restaurant chain in the UK.

RULES:
- Answer accurately based on the company data and Knowledge Base provided below
- If you don't have the information, say so honestly
- Respond in the same language the user uses (Korean or English)
- Be concise but thorough
- For recipes, include ingredients, quantities, and steps${MODE === 'staff' ? '\n- You can only answer about: recipes, cooking methods, ingredients, store operations, training, and hygiene\n- Do NOT discuss finances, marketing strategy, expansion plans, or confidential business information' : '\n- You have full access to all company knowledge including marketing, strategy, finances, and expansion plans\n- When asked for marketing info, provide accurate brand details, menu descriptions, and promotional content that can be used with external tools'}

`;

    // Inject TBMS company data
    prompt += '\n=== COMPANY DATA (from TBMS database) ===\n';

    // Stores
    if (tbmsData.Stores.length > 0) {
      prompt += '\n## Stores\n';
      tbmsData.Stores.forEach(s => {
        prompt += `- ${s.code} "${s.name}" | Company: ${s.company||'-'} | Address: ${s.address||'-'} | Phone: ${s.phone||'-'} | Email: ${s.email||'-'} | Manager: ${s.manager||'-'}${s.active===false?' (INACTIVE)':''}\n`;
        // Merge StoreInfo if available
        const info = tbmsData.StoreInfo.find(si => String(si.storeId) === String(s.id));
        if (info) {
          if (info.monthlyRent) prompt += `  Rent: £${info.monthlyRent}/month | Lease: ${info.leaseStart||'?'} ~ ${info.leaseEnd||'?'}\n`;
          if (info.hygieneRating) prompt += `  Hygiene Rating: ${info.hygieneRating} (${info.hygieneInspDate||'?'})\n`;
          if (info.electricCompany) prompt += `  Electric: ${info.electricCompany}\n`;
          if (info.cardMachineCompany) prompt += `  Card Machine: ${info.cardMachineCompany} (rate: ${info.cardRate||'?'})\n`;
        }
      });
    }

    // Staff (manager mode: full detail, staff mode: names only)
    if (tbmsData.Staff.length > 0) {
      const activeStaff = tbmsData.Staff.filter(s => s.active !== false && s.active !== 'false');
      prompt += `\n## Staff (${activeStaff.length} active)\n`;
      if (MODE === 'manager') {
        activeStaff.forEach(s => {
          const storeName = tbmsData.Stores.find(st => String(st.id) === String(s.storeId))?.name || s.storeId;
          prompt += `- ${s.name}${s.nickName?' ('+s.nickName+')':''} | Store: ${storeName} | Mobile: ${s.mobile||'-'} | Email: ${s.email||'-'} | Rate: £${s.rate||'?'}/hr | Start: ${s.startDate||'-'}\n`;
        });
      } else {
        const byStore = {};
        activeStaff.forEach(s => {
          const storeName = tbmsData.Stores.find(st => String(st.id) === String(s.storeId))?.name || s.storeId;
          if (!byStore[storeName]) byStore[storeName] = [];
          byStore[storeName].push(s.name);
        });
        Object.entries(byStore).forEach(([store, names]) => {
          prompt += `- ${store}: ${names.join(', ')}\n`;
        });
      }
    }

    // Suppliers (manager only)
    if (MODE === 'manager' && tbmsData.Suppliers.length > 0) {
      const activeSup = tbmsData.Suppliers.filter(s => s.active !== false && s.active !== 'false');
      prompt += `\n## Suppliers (${activeSup.length})\n`;
      activeSup.forEach(s => {
        prompt += `- ${s.name} | Phone: ${s.phone||'-'} | Email: ${s.email||'-'} | Website: ${s.website||'-'}\n`;
      });
    }

    prompt += '\n=== END COMPANY DATA ===\n';

    // Inject Knowledge Base entries
    if (relevantKB.length > 0) {
      prompt += '\n=== KNOWLEDGE BASE (relevant entries) ===\n';
      relevantKB.forEach(kb => {
        prompt += `\n[${kb.category}] ${kb.title}\n${kb.content}\n`;
        if (kb.tags) prompt += `Tags: ${kb.tags}\n`;
      });
      prompt += '\n=== END KNOWLEDGE BASE ===\n';
    }
  }

  return prompt;
}

function parseTrainingResponse(response) {
  // Try to parse as JSON array
  try {
    let jsonStr = response;
    // Extract JSON from markdown code blocks if present
    const match = response.match(/```(?:json)?\s*([\s\S]*?)```/);
    if (match) jsonStr = match[1];

    const entries = JSON.parse(jsonStr.trim());
    if (Array.isArray(entries) && entries.length > 0) {
      const baseIndex = pendingKBEntries.length;
      entries.forEach((entry, i) => {
        entry.source = 'training';
        entry.createdBy = 'manager';
        pendingKBEntries.push(entry);
      });

      let html = `<div class="msg msg-bot">📚 Extracted <strong>${entries.length}</strong> knowledge entries. Review and save:<br><br>`;
      entries.forEach((entry, i) => {
        html += renderKBPreview(entry, baseIndex + i);
      });
      html += '</div>';

      const div = document.createElement('div');
      div.innerHTML = html;
      document.getElementById('chatArea').appendChild(div.firstChild);
      scrollToBottom();

      chatHistory.push({ role: 'assistant', content: `[Extracted ${entries.length} KB entries for review]` });
      return;
    }
  } catch(e) {
    // Not JSON — treat as regular response
  }

  // Regular text response
  addBotMessage(response);
  chatHistory.push({ role: 'assistant', content: response });
}

// ============================================================
//  AI Provider Calls
// ============================================================
function getDefaultModel(provider) {
  if (provider === 'chatgpt') return 'gpt-4o';
  if (provider === 'gemini') return 'gemini-2.0-flash';
  return 'claude-sonnet-4-20250514';
}

async function callChatGPT(apiKey, model, messages) {
  const res = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
    body: JSON.stringify({ model, messages, max_tokens: 4096, temperature: 0.7 })
  });
  if (!res.ok) throw new Error('ChatGPT API error: ' + res.status);
  const data = await res.json();
  return data.choices[0].message.content;
}

async function callGemini(apiKey, model, messages) {
  const contents = messages.filter(m => m.role !== 'system').map(m => ({
    role: m.role === 'assistant' ? 'model' : 'user',
    parts: [{ text: m.content }]
  }));
  const sysMsg = messages.find(m => m.role === 'system');
  const body = { contents };
  if (sysMsg) body.systemInstruction = { parts: [{ text: sysMsg.content }] };
  body.generationConfig = { maxOutputTokens: 4096, temperature: 0.7 };

  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error('Gemini API error: ' + res.status);
  const data = await res.json();
  return data.candidates[0].content.parts[0].text;
}

async function callClaude(apiKey, model, messages) {
  const sysMsg = messages.find(m => m.role === 'system');
  const msgs = messages.filter(m => m.role !== 'system');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model,
      max_tokens: 4096,
      system: sysMsg ? sysMsg.content : '',
      messages: msgs
    })
  });
  if (!res.ok) throw new Error('Claude API error: ' + res.status);
  const data = await res.json();
  return data.content[0].text;
}

// ============================================================
//  Settings & Storage
// ============================================================
function loadLocalSettings() {
  const provider = localStorage.getItem('tbap_bot_provider') || 'chatgpt';
  document.getElementById('aiProvider').value = provider;
  document.getElementById('setProvider').value = provider;
  const key = localStorage.getItem('tbap_api_key_' + provider) || '';
  document.getElementById('setApiKey').value = key;
  const model = localStorage.getItem('tbap_model_' + provider) || '';
  document.getElementById('setModel').value = model;
}

function saveSettings() {
  const provider = document.getElementById('setProvider').value;
  const apiKey = document.getElementById('setApiKey').value.trim();
  const model = document.getElementById('setModel').value.trim();

  localStorage.setItem('tbap_bot_provider', provider);
  if (apiKey) localStorage.setItem('tbap_api_key_' + provider, apiKey);
  if (model) localStorage.setItem('tbap_model_' + provider, model);

  document.getElementById('aiProvider').value = provider;
  toggleSettings();
  addSystemMessage('Settings saved ✓');
}

function saveLocalSetting(key, val) {
  localStorage.setItem('tbap_' + key, val);
}

function toggleSettings() {
  const panel = document.getElementById('settingsPanel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) {
    loadLocalSettings();
  }
}
